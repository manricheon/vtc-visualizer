<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTC Visualizer</title>
<link rel="icon" href="data:,">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  /* ===== chart chrome & ink tokens (dataviz reference palette, light) ===== */
  :root {
    color-scheme: light;
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --ink-1: #0b0b0b;
    --ink-2: #52514e;
    --ink-muted: #898781;
    --grid: #e1e0d9;
    --axis: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --accent: #2a78d6;
    --danger: #d03b3b;
    --font: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--page); color: var(--ink-1);
    font-family: var(--font); font-size: 14px; line-height: 1.5;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 16px 20px 60px; }

  header.app {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 0 16px;
  }
  header.app h1 { font-size: 20px; margin: 0; font-weight: 700; }
  header.app .sub { color: var(--ink-muted); font-size: 12px; margin-right: auto; }

  button, select, input[type="text"], input[type="number"], input[type="search"], textarea {
    font-family: var(--font); font-size: 13px; color: var(--ink-1);
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 9px;
  }
  button { cursor: pointer; }
  button:hover { border-color: var(--ink-muted); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { filter: brightness(0.94); }
  button.ghost { background: transparent; }
  button.danger { color: var(--danger); }
  button.small { font-size: 12px; padding: 3px 7px; }
  input[type="color"] { width: 30px; height: 24px; padding: 1px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface-1); cursor: pointer; }
  label.inline { display: inline-flex; align-items: center; gap: 5px; color: var(--ink-2); }

  section.card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 16px;
  }
  section.card h2 { font-size: 13px; margin: 0 0 10px; color: var(--ink-2); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

  /* ===== data input ===== */
  #dropzone {
    border: 1.5px dashed var(--axis); border-radius: 8px;
    padding: 18px; text-align: center; color: var(--ink-muted);
    transition: background .15s, border-color .15s;
  }
  #dropzone.drag { background: #eef4fd; border-color: var(--accent); color: var(--accent); }
  #dropzone .btns { margin-top: 8px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  #datasetChips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: #eef4fd; border: 1px solid var(--border); border-radius: 999px;
    padding: 2px 6px 2px 10px; font-size: 12px;
  }
  .chip .n { color: var(--ink-muted); }
  .chip button { border: none; background: none; padding: 0 4px; color: var(--ink-muted); font-size: 13px; }
  .chip button:hover { color: var(--danger); }

  /* ===== chart cards ===== */
  .chart-card { padding: 0; overflow: hidden; }
  .chart-card .head {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-bottom: 1px solid var(--border); background: var(--surface-1);
  }
  .chart-card .head .name { font-weight: 600; margin-right: auto; font-size: 14px; }
  .chart-card .body { display: flex; align-items: stretch; }
  .chart-card .cfg {
    width: 292px; flex: none; border-right: 1px solid var(--border);
    padding: 10px 12px; overflow-y: auto; max-height: 640px; font-size: 13px;
  }
  .chart-card .cfg.hidden { display: none; }
  .chart-card .plot { flex: 1; min-width: 0; min-height: 460px; }
  .chart-card .plot-hint { padding: 5px 12px; font-size: 11px; color: var(--ink-muted); border-top: 1px solid var(--grid); }
  details.grp { margin-bottom: 8px; border-bottom: 1px solid var(--grid); padding-bottom: 8px; }
  details.grp summary { cursor: pointer; font-weight: 600; color: var(--ink-2); font-size: 12.5px; padding: 3px 0; user-select: none; }
  .row { display: flex; align-items: center; gap: 6px; margin: 6px 0; flex-wrap: wrap; }
  .row > span.lbl { width: 74px; flex: none; color: var(--ink-muted); font-size: 12px; }
  .row select, .row input[type="text"] { flex: 1; min-width: 60px; }
  .row input[type="number"] { width: 74px; }
  .hint { color: var(--ink-muted); font-size: 11.5px; margin: 4px 0; }
  .filter-row { display: flex; gap: 4px; margin: 4px 0; align-items: center; }
  .filter-row select { flex: 1; min-width: 40px; }
  .filter-row .op { flex: none; width: 62px; }
  .filter-row input { flex: 1; width: 50px; min-width: 40px; }
  .filter-vals { display: flex; flex-wrap: wrap; gap: 2px 12px; margin: 2px 0 8px 6px; }
  .filter-vals label.inline { font-size: 12px; gap: 4px; }
  .series-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
  .series-row .sname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
  .series-row select { width: 92px; flex: none; }
  .series-row input[type="number"] { width: 52px; }
  .series-block { margin: 6px 0; padding-bottom: 4px; border-bottom: 1px dashed var(--grid); }
  .series-block:last-child { border-bottom: none; }
  .series-row.sub { margin: 2px 0 0 10px; }
  .series-row.sub select { flex: 1; width: auto; min-width: 0; }
  .series-row.sub input[type="number"] { width: 46px; flex: none; }

  /* ===== data table ===== */
  #tableCtrl { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  #tableCtrl input[type="search"] { width: 240px; }
  #tableCtrl .count { color: var(--ink-muted); font-size: 12px; }
  #tableWrap { overflow: auto; max-height: 480px; border: 1px solid var(--grid); border-radius: 8px; }
  table.data { border-collapse: collapse; width: 100%; font-size: 12.5px; font-variant-numeric: tabular-nums; }
  table.data th, table.data td { padding: 5px 10px; border-bottom: 1px solid var(--grid); text-align: left; white-space: nowrap; }
  table.data th {
    position: sticky; top: 0; background: var(--surface-1); cursor: pointer;
    color: var(--ink-2); font-weight: 600; user-select: none; border-bottom: 1px solid var(--axis);
  }
  table.data th:hover { color: var(--accent); }
  table.data tr:hover td { background: #f4f6fa; }
  #pager { display: flex; gap: 8px; align-items: center; margin-top: 8px; color: var(--ink-muted); font-size: 12px; }

  /* ===== modal ===== */
  #modalBack {
    display: none; position: fixed; inset: 0; background: rgba(11,11,11,0.35); z-index: 50;
    align-items: center; justify-content: center;
  }
  #modalBack.show { display: flex; }
  #pasteModal {
    background: var(--surface-1); border-radius: 10px; padding: 18px; width: min(680px, 92vw);
    display: flex; flex-direction: column; gap: 10px;
  }
  #pasteModal textarea { width: 100%; height: 240px; font-family: ui-monospace, monospace; font-size: 12px; resize: vertical; }

  /* ===== point-click popover ===== */
  #ptPopover {
    display: none; position: fixed; z-index: 60; min-width: 180px;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 4px 16px rgba(11,11,11,0.14); padding: 6px;
  }
  #ptPopover.show { display: flex; flex-direction: column; gap: 4px; }
  #ptPopover .pp-title { font-size: 11.5px; color: var(--ink-muted); padding: 2px 4px; font-variant-numeric: tabular-nums; }
  #ptPopover .pp-note { font-size: 10.5px; color: var(--ink-muted); padding: 2px 4px 0; border-top: 1px solid var(--grid); }
  #ptPopover button { text-align: left; border: none; padding: 6px 8px; border-radius: 6px; }
  #ptPopover button:hover { background: #eef4fd; }
  #ptPopover .pp-row { display: flex; gap: 4px; }
  #ptPopover .pp-row button { flex: 1; text-align: center; border: 1px solid var(--border); }
  #ptPopover input[type="text"] { width: 100%; }

  /* ===== data table: include/exclude ===== */
  table.data th.chk, table.data td.chk { width: 30px; text-align: center; padding: 5px 6px; cursor: default; }
  table.data tr.excl td:not(.chk) { opacity: 0.4; }

  /* ===== toast ===== */
  #toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(10px);
    background: var(--ink-1); color: #fff; border-radius: 8px; padding: 9px 14px;
    display: flex; gap: 12px; align-items: center; font-size: 13px;
    opacity: 0; pointer-events: none; transition: opacity .18s, transform .18s; z-index: 70;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  #toast button { background: none; border: none; color: #8db9ee; font-weight: 600; padding: 0; }
  #toast button:hover { text-decoration: underline; }

  footer { color: var(--ink-muted); font-size: 12px; text-align: center; margin-top: 24px; }
  #emptyCharts { color: var(--ink-muted); text-align: center; padding: 30px 0; }
  @media (max-width: 860px) {
    .chart-card .body { flex-direction: column; }
    .chart-card .cfg { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 320px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <h1>VTC Visualizer</h1>
    <span class="sub" data-i18n="header.sub"></span>
    <button id="btnAddChart" class="primary" data-i18n="btn.addChart"></button>
    <button id="btnExportSession" data-i18n="btn.exportSession"></button>
    <button id="btnImportSession" data-i18n="btn.importSession"></button>
    <button id="btnReset" class="danger ghost" data-i18n="btn.reset"></button>
    <button id="btnLangToggle" class="ghost"></button>
  </header>

  <section class="card">
    <h2 data-i18n="section.dataInput"></h2>
    <div id="dropzone">
      <span data-i18n="dropzone.text"></span>
      <div class="btns">
        <button id="btnOpenFiles" data-i18n="btn.openFiles"></button>
        <button id="btnOpenFolder" data-i18n="btn.openFolder"></button>
        <button id="btnPaste" data-i18n="btn.paste"></button>
      </div>
    </div>
    <div id="datasetChips"></div>
    <input type="file" id="fileInput" accept=".csv,.json,.tsv" multiple hidden>
    <input type="file" id="folderInput" webkitdirectory multiple hidden>
  </section>

  <div id="charts"></div>
  <div id="emptyCharts" data-i18n="emptyCharts.text"></div>

  <section class="card">
    <h2 data-i18n="section.rawData"></h2>
    <div id="tableCtrl">
      <input type="search" id="tableSearch" data-i18n-ph="table.searchPh">
      <span class="count" id="tableCount"></span>
      <button class="small" id="restoreExcl" hidden data-i18n="table.restoreExcl"></button>
    </div>
    <div id="tableWrap"><table class="data" id="dataTable"></table></div>
    <div id="pager">
      <button class="small" id="pgPrev" data-i18n="pager.prev"></button>
      <span id="pgInfo"></span>
      <button class="small" id="pgNext" data-i18n="pager.next"></button>
    </div>
  </section>

  <footer>VTC Visualizer — <span data-i18n="footer.text"></span> © mrc</footer>
</div>

<div id="modalBack">
  <div id="pasteModal">
    <strong data-i18n="modal.title"></strong>
    <div class="row"><span class="lbl" data-i18n="modal.datasetName"></span><input type="text" id="pasteName" data-i18n-ph="modal.datasetNamePh"></div>
    <textarea id="pasteText" data-i18n-ph="modal.pasteTextPh"></textarea>
    <div class="row" style="justify-content:flex-end">
      <button id="pasteCancel" data-i18n="btn.cancel"></button>
      <button id="pasteAdd" class="primary" data-i18n="btn.add"></button>
    </div>
  </div>
</div>

/* ================= parsing ================= */
function parseCSV(text) {
  const rows = [];
  let field = '', row = [], inQ = false;
  const pushF = () => { row.push(field); field = ''; };
  const pushR = () => { if (row.length > 1 || row[0] !== '') rows.push(row); row = []; };
  const sep = text.split('\n', 1)[0].includes('\t') ? '\t' : ',';
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += c;
    } else if (c === '"') inQ = true;
    else if (c === sep) pushF();
    else if (c === '\n') { pushF(); pushR(); }
    else if (c !== '\r') field += c;
  }
  if (field !== '' || row.length) { pushF(); pushR(); }
  if (rows.length < 2) throw new Error(t('err.csvHeaderRows'));
  const header = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => {
    const o = {};
    header.forEach((h, i) => { o[h] = coerce(r[i]); });
    return o;
  });
}
function coerce(v) {
  if (v === undefined || v === null) return null;
  const s = String(v).trim();
  if (s === '') return null;
  const n = Number(s.replace(/,/g, ''));
  return Number.isFinite(n) && /^[\s]*[-+]?[\d.,eE+-]+[\s]*$/.test(s) ? n : s;
}
function parseAny(text, filename) {
  const t = text.trim();
  if (t.startsWith('[') || t.startsWith('{') || /\.json$/i.test(filename || '')) {
    let j = JSON.parse(t);
    if (!Array.isArray(j)) {
      const arr = Object.values(j).find(v => Array.isArray(v));
      if (arr) j = arr; else throw new Error(t('err.jsonArray'));
    }
    return j.map(o => {
      const r = {};
      for (const k of Object.keys(o)) {
        const v = o[k];
        r[k] = (v !== null && typeof v === 'object') ? JSON.stringify(v) : (typeof v === 'string' ? coerce(v) : v);
      }
      return r;
    });
  }
  return parseCSV(text);
}

/* ================= data model ================= */
function addDataset(name, rows) {
  if (!rows.length) { alert(tf('err.noRowsInDataset', { name })); return; }
  rows.forEach(r => { r._source = name; });
  const existing = state.datasets.find(d => d.name === name);
  if (existing) existing.rows = rows;
  else state.datasets.push({ id: state.nextId++, name, rows });
  onDataChanged();
}
function removeDataset(id) {
  state.datasets = state.datasets.filter(d => d.id !== id);
  onDataChanged();
}
function allRows() { return state.datasets.flatMap(d => d.rows); }
function columns() {
  const set = new Set();
  for (const d of state.datasets) for (const r of d.rows) for (const k of Object.keys(r)) {
    if (k.startsWith('_') && k !== '_source') continue;   // 내부 키(_excluded 등) 숨김
    set.add(k);
  }
  return [...set];
}
/* _source는 데이터셋이 2개 이상일 때만 노출 (1개면 헷갈리기만 함) */
function visibleColumns() {
  const cols = columns();
  return state.datasets.length > 1 ? cols : cols.filter(c => c !== '_source');
}
function numericColumns() {
  const cols = columns(), rows = allRows(), out = [];
  for (const c of cols) {
    let any = false, ok = true;
    for (const r of rows) {
      const v = r[c];
      if (v === null || v === undefined) continue;
      any = true;
      if (typeof v !== 'number') { ok = false; break; }
    }
    if (any && ok) out.push(c);
  }
  return out;
}
function uniqueVals(col) {
  const s = new Set();
  for (const r of allRows()) { const v = r[col]; if (v !== null && v !== undefined) s.add(v); }
  return [...s].sort((a, b) => (typeof a === 'number' && typeof b === 'number') ? a - b : String(a).localeCompare(String(b)));
}
function applyFilters(rows, filters) {
  return rows.filter(r => filters.every(f => {
    if (!f.col) return true;
    if (f.value === '' || f.value === null || f.value === undefined) return true;   // 값 미입력 필터는 무시 (차트가 갑자기 비지 않게)
    const v = r[f.col];
    if (v === null || v === undefined) return false;
    if (f.op === 'in') {   // 다중 선택: 빈 배열이면 통과(미완성 필터)
      return !Array.isArray(f.value) || f.value.length === 0 || f.value.map(String).includes(String(v));
    }
    const t = coerce(f.value);
    switch (f.op) {
      case '=': return String(v) === String(t);
      case '≠': return String(v) !== String(t);
      case '>': return typeof v === 'number' && v > Number(t);
      case '<': return typeof v === 'number' && v < Number(t);
      case '≥': return typeof v === 'number' && v >= Number(t);
      case '≤': return typeof v === 'number' && v <= Number(t);
      case '포함': return String(v).includes(String(f.value));
      default: return true;
    }
  }));
}

/* ================= chart rendering ================= */
const plotDivs = {};   // chartId -> div
/* 시리즈 정의: 색=group, 모양=group2. 인덱스는 전체(미필터) 고유값 기준 — 색/모양이 엔티티를 따라감 */
function seriesDefs(cfg) {
  if (!cfg.group) return [{ name: t('all'), colorIdx: 0, symIdx: 0, g: null, g2: null, match: () => true }];
  const gs = uniqueVals(cfg.group).map(String);
  if (!cfg.group2 || cfg.group2 === cfg.group) {
    return gs.map((g, i) => ({ name: g, colorIdx: i, symIdx: i, g, g2: null, match: r => String(r[cfg.group]) === g }));
  }

    return a;
  };
  // 가로 막대: 카테고리(X 설정)가 y축, 값(Y 설정)이 x축에 놓인다
  const horizBar = cfg.type === 'bar' && cfg.barOrient === 'h';
  const xaxis = horizBar ? axis(cfg.yLabel, cfg.yScale, cfg.yMin, cfg.yMax, cfg.y)
                         : axis(cfg.xLabel, cfg.xScale, cfg.xMin, cfg.xMax, cfg.x);
  const yaxis = horizBar ? axis(cfg.xLabel, cfg.xScale, cfg.xMin, cfg.xMax, cfg.x)
                         : axis(cfg.yLabel, cfg.yScale, cfg.yMin, cfg.yMax, cfg.y);
  if (cfg.type === 'bar') {
    const catOrder = { label: 'category ascending', asc: 'total ascending', desc: 'total descending' }[cfg.barSort];
    if (catOrder) (horizBar ? yaxis : xaxis).categoryorder = catOrder;
  }
  return {
    title: cfg.title ? { text: cfg.title, font: { family: cfg.fontFamily, size: cfg.fontSize + 4, color: cfg.fontColor }, x: 0.5 } : undefined,
    font: { family: cfg.fontFamily, size: cfg.fontSize, color: cfg.fontColor },
    paper_bgcolor: CHROME.surface, plot_bgcolor: CHROME.surface,
    xaxis, yaxis,
    showlegend: cfg.legendPos !== 'none' && (seriesDefs(cfg).length > 1 || cfg.pareto),
    legend: legend ? { ...legend, traceorder: 'normal' } : undefined,
    margin: { l: 64, r: cfg.legendPos === 'right' ? 8 : 40, t: cfg.title ? 52 : 28, b: 56 },
    hovermode: 'closest',
    annotations: buildAnnotations(cfg),
    shapes: baselineShapes(cfg, gd),
    barmode: cfg.barMode || 'group', bargap: 0.25, bargroupgap: 0.08,
    // 스타일 변경 시 줌/팬 유지 — 축·범위·스케일·차트 유형/막대 방향이 바뀔 때만 뷰 리셋
    uirevision: [cfg.id, cfg.type, cfg.barOrient, cfg.x, cfg.y, cfg.xScale, cfg.yScale, cfg.xMin, cfg.xMax, cfg.yMin, cfg.yMax].join('|'),
  };
}

function renderPlot(cfg) {
  const div = plotDivs[cfg.id];
  if (!div) return;
  if (!cfg.x || !cfg.y || !allRows().length) {
    Plotly.purge(div);
    div.innerHTML = `<div style="padding:40px;color:#898781;text-align:center">${esc(t('plot.placeholder'))}</div>`;
    div._vizBound = false;   // purge가 이벤트 에미터를 제거하므로 재바인딩 필요
    return;
  }
  const gd = div;
  if (!gd.data) gd.innerHTML = '';   // placeholder 텍스트만 제거 — 기존 플롯 DOM은 Plotly.react가 관리
  Plotly.react(gd, buildTraces(cfg), buildLayout(cfg, gd._fullLayout ? gd : null), {
    responsive: true, displaylogo: false,
    scrollZoom: true, displayModeBar: true,
    edits: { annotationTail: true },
    modeBarButtonsToRemove: ['lasso2d', 'select2d'],
  }).then(() => {
    if (!gd._vizBound) {
      gd._vizBound = true;
      gd.on('plotly_click', ev => {
        const p = ev.points && ev.points[0];
        if (!p || p.data.name === 'Pareto frontier') return;
        const c = state.charts.find(ch => ch.id === cfg.id);
        if (c) showPointPopover(c, gd, p, ev.event);
      });
      gd.on('plotly_clickannotation', ev => {
        const c = state.charts.find(ch => ch.id === cfg.id);
        if (!c || !ev.annotation) return;
        if (ev.annotation._kind === 'plabel') {          // 포인트 레이블 클릭 → 개별 숨김
          if (!c.hiddenLabels.includes(ev.annotation._key)) c.hiddenLabels.push(ev.annotation._key);
          renderPlot(c); refreshPanels(c); save();
        } else if (ev.annotation._kind === 'tmarker') {  // 텍스트 마커 클릭 → 편집/삭제
          showMarkerEditPopover(c, ev.annotation._tmIdx, ev.event);
        }
      });
      gd.on('plotly_relayout', ev => {
        const c = state.charts.find(ch => ch.id === cfg.id);
        if (!c) return;
        let moved = false, zoomed = false;
        for (const k of Object.keys(ev)) {
          const m = k.match(/^annotations\[(\d+)\]\.(ax|ay)$/);
          if (m) {
            const ann = gd.layout.annotations[Number(m[1])];
            if (!ann) continue;
            if (ann._kind === 'plabel' && ann._key) {
              const off = c.labelOffsets[ann._key] || { ax: 0, ay: -14 };
              off[m[2]] = ev[k];
              c.labelOffsets[ann._key] = off;
              moved = true;
            } else if (ann._kind === 'tmarker' && c.textMarkers[ann._tmIdx]) {
              c.textMarkers[ann._tmIdx][m[2]] = ev[k];
              moved = true;
            }
          }
          if (/^[xy]axis\.range/.test(k) || k === 'autosize') zoomed = true;
        }
        if (moved) save();
        if (zoomed && c.baselines.some(b => (b.shade || 'none') !== 'none')) {
          Plotly.relayout(gd, { shapes: baselineShapes(c, gd) });
        }
      });
    }
  });
}

/* ---- 포인트 클릭 팝오버: 베이스라인 / 텍스트 마커 ---- */
const popover = document.createElement('div');
popover.id = 'ptPopover';
document.body.append(popover);
document.addEventListener('pointerdown', e => { if (!popover.contains(e.target)) hidePopover(); }, true);
function hidePopover() { popover.classList.remove('show'); popover.innerHTML = ''; }
function placePopover(mouseEv) {
  const x = Math.min((mouseEv && mouseEv.clientX || 200) + 6, window.innerWidth - 230);
  const y = Math.min((mouseEv && mouseEv.clientY || 200) + 6, window.innerHeight - 140);
  popover.style.left = x + 'px'; popover.style.top = y + 'px';
  popover.classList.add('show');
}
function showPointPopover(c, gd, p, mouseEv) {
  popover.innerHTML = '';
  const bIdx = c.baselines.findIndex(b => b.x === p.x && b.y === p.y);
  popover.append(
    el('div', { class: 'pp-title' }, `(${p.x}, ${p.y})`),
    el('button', {
      onclick: () => {
        if (bIdx >= 0) c.baselines.splice(bIdx, 1);
        else c.baselines.push({ x: p.x, y: p.y, shade: 'none' });
        hidePopover(); renderPlot(c); refreshPanels(c); save();
      },
    }, bIdx >= 0 ? t('pt.removeBaseline') : t('pt.addBaseline')),
    el('button', {
      onclick: () => {
        const g = p.data && p.data._g, g2 = p.data && p.data._g2;
        const hit = [];
        for (const r of allRows()) {
          if (r._excluded) continue;
          if (r[c.x] === p.x && r[c.y] === p.y
              && (g == null || String(r[c.group]) === g)
              && (g2 == null || String(r[c.group2]) === g2)) { r._excluded = true; hit.push(r); }
        }
        hidePopover();
        if (hit.length) {
          const refresh = () => { for (const ch of state.charts) renderPlot(ch); renderTable(); save(); };
          refresh();
          showToast(tf('toast.excluded', { n: hit.length }), t('toast.undo'), () => { hit.forEach(r => delete r._excluded); refresh(); });
        }
      },
    }, t('pt.excludePoint')),
    el('button', {
      onclick: () => {
        popover.innerHTML = '';
        const inp = el('input', { type: 'text', placeholder: t('pt.textPlaceholder') });
        const add = () => {
          const txt = inp.value.trim();
          if (txt) { c.textMarkers.push({ x: p.x, y: p.y, text: txt, ax: 40, ay: -40 }); renderPlot(c); refreshPanels(c); save(); }
          hidePopover();
        };
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') add(); if (e.key === 'Escape') hidePopover(); });
        popover.append(el('div', { class: 'pp-title' }, t('pt.textMarker')), inp,
          el('div', { class: 'pp-row' }, el('button', { onclick: add }, t('btn.add')), el('button', { onclick: hidePopover }, t('btn.cancel'))));
        placePopover(mouseEv); inp.focus();
      },
    }, t('pt.addTextMarker')),
    el('div', { class: 'pp-note' }, t('pt.excludeNote')),
  );
  placePopover(mouseEv);
}
function showMarkerEditPopover(c, idx, mouseEv) {
  const m = c.textMarkers[idx];
  if (!m) return;
  popover.innerHTML = '';
  const inp = el('input', { type: 'text', value: m.text });
  const apply = () => {
    const txt = inp.value.trim();
    if (txt) m.text = txt; else c.textMarkers.splice(idx, 1);   // 비우면 삭제
    hidePopover(); renderPlot(c); refreshPanels(c); save();
  };
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') apply(); if (e.key === 'Escape') hidePopover(); });
  const live = () => { renderPlot(c); refreshPanels(c); save(); };
  popover.append(el('div', { class: 'pp-title' }, t('pt.editTextMarker')), inp,
    el('div', { class: 'pp-row' },
      el('input', { type: 'color', value: m.color || c.tmColor || c.fontColor, title: t('cfg.fontColorTitle'), oninput: e => { m.color = e.target.value; live(); } }),
      el('input', { type: 'number', value: m.size || '', min: 8, max: 40, placeholder: t('pt.sizePlaceholder'), title: t('pt.sizeTitle'), style: 'width:64px', oninput: e => { m.size = e.target.value; live(); } }),
    ),
    el('div', { class: 'pp-row' },
      el('button', { onclick: apply }, t('btn.save')),
      el('button', { class: 'danger', onclick: () => { c.textMarkers.splice(idx, 1); hidePopover(); live(); } }, t('btn.delete')),
      el('button', { onclick: hidePopover }, t('btn.cancel'))));
  placePopover(mouseEv); inp.focus(); inp.select();
}
/* 설정 패널의 동적 목록(베이스라인/마커/숨긴 레이블) 갱신 */

const toastEl = document.createElement('div');

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) e.append(c);
  return e;
}
function select(options, value, onchange, attrs = {}) {
  const s = el('select', { ...attrs, onchange: e => onchange(e.target.value) });
  for (const o of options) {
    const [val, label] = Array.isArray(o) ? o : [o, o];
    const opt = el('option', { value: val }, label);
    if (String(val) === String(value)) opt.selected = true;
    s.append(opt);
  }
  return s;
}
function colSelect(cfg, key, opts) {
  const { allowEmpty = true, emptyLabel = t('opt.noneParen'), onChange } = opts || {};
  const cols = visibleColumns();
  const items = allowEmpty ? [['', emptyLabel], ...cols] : cols;

}

          select(SYMBOLS, st.symbol, v => upd({ symbol: v }), { title: t('cfg.markerShapeTitle') }),
          el('input', { type: 'number', value: st.msize, min: 3, max: 40, title: t('cfg.markerSizeTitle'), oninput: e => upd({ msize: Number(e.target.value) || cfg.markerSize }) }),
          select(DASHES(), st.dash, v => upd({ dash: v }), { title: t('cfg.lineType') }),
          el('input', { type: 'number', value: st.lwidth, min: 0.5, max: 10, step: 0.5, title: t('cfg.lineWidth'), oninput: e => upd({ lwidth: Number(e.target.value) || cfg.lineWidth }) }),
        )]),
      ));
    });
  };
  renderSeries();
  gStyle.append(
    row(t('cfg.title'), el('input', { type: 'text', value: cfg.title, oninput: e => { cfg.title = e.target.value; nameSpan.textContent = cfg.title || tf('card.chartNum', { n: state.charts.indexOf(cfg) + 1 }); rp(); } })),
    row(t('cfg.font'), select(FONTS.map(f => [f, f.split(',')[0].replace(/"/g, '')]), cfg.fontFamily, v => { cfg.fontFamily = v; rp(); })),
    row(t('cfg.fontSize'), el('input', { type: 'number', value: cfg.fontSize, min: 8, max: 32, oninput: e => { cfg.fontSize = Number(e.target.value) || 13; rp(); } }),
        el('input', { type: 'color', value: cfg.fontColor, title: t('cfg.fontColorTitle'), oninput: e => { cfg.fontColor = e.target.value; rp(); } })),
    row(t('cfg.legend'), select([['right', t('opt.right')], ['top', t('opt.top')], ['inside', t('opt.inside')], ['none', t('opt.hidden')]], cfg.legendPos, v => { cfg.legendPos = v; rp(); })),
    ...(isBar ? [] : [
      row(t('cfg.markerSize'), el('input', { type: 'number', value: cfg.markerSize, min: 3, max: 40, oninput: e => { cfg.markerSize = Number(e.target.value) || 9; rp(); renderSeries(); } }),
          el('span', { class: 'lbl', style: 'width:auto' }, t('cfg.lineWidth')),
          el('input', { type: 'number', value: cfg.lineWidth, min: 0.5, max: 10, step: 0.5, oninput: e => { cfg.lineWidth = Number(e.target.value) || 2; rp(); } })),
      row(t('cfg.lineType'), select(DASHES(), cfg.lineDash, v => { cfg.lineDash = v; rp(); renderSeries(); }),
          select([['linear', t('opt.straightLine')], ['spline', t('opt.spline')]], cfg.lineShape, v => { cfg.lineShape = v; rp(); })),
      row(t('cfg.areaFill'), select([['none', t('opt.none')], ['tozeroy', t('opt.pastelFill')]], cfg.areaFill, v => { cfg.areaFill = v; rp(); })),
      el('div', { class: 'hint' }, t('cfg.styleHint')),
    ]),
    seriesBox,
  );

  /* --- 포인트 레이블 & 텍스트 마커 --- */
  const gLabel = el('details', { class: 'grp' }, el('summary', {}, t('cfg.pointLabels')));
  const hiddenBox = el('div');
  const markerBox = el('div');
  const renderLabelLists = () => {
    hiddenBox.innerHTML = '';
    if (cfg.hiddenLabels.length) {
      hiddenBox.append(el('button', { class: 'small', onclick: () => { cfg.hiddenLabels = []; renderLabelLists(); rp(); } },
        tf('cfg.restoreHiddenLabels', { n: cfg.hiddenLabels.length })));
    }
    markerBox.innerHTML = '';
    if (cfg.textMarkers.length) {
      markerBox.append(
        el('div', { class: 'hint' }, t('cfg.textMarkerGlobal')),
        el('div', { class: 'row' },
          el('span', { class: 'lbl' }, t('cfg.fontLabel')),
          el('input', { type: 'number', value: cfg.tmFontSize, min: 8, max: 40, placeholder: 'auto', title: t('cfg.tmFontSizeTitle'), oninput: e => { cfg.tmFontSize = e.target.value; rp(); } }),
          el('input', { type: 'color', value: cfg.tmColor || cfg.fontColor, title: t('cfg.tmColorTitle'), oninput: e => { cfg.tmColor = e.target.value; rp(); } }),
          el('label', { class: 'inline' }, el('input', { type: 'checkbox', ...(cfg.tmBg ? { checked: '' } : {}), onchange: e => { cfg.tmBg = e.target.checked; rp(); } }), t('cfg.background')),
          el('label', { class: 'inline' }, el('input', { type: 'checkbox', ...(cfg.tmArrow ? { checked: '' } : {}), onchange: e => { cfg.tmArrow = e.target.checked; rp(); } }), t('cfg.arrow')),
        ),
      );
    }
    cfg.textMarkers.forEach((m, i) => {
      markerBox.append(el('div', { class: 'series-row' },
        el('input', { type: 'color', value: m.color || cfg.tmColor || cfg.fontColor, title: t('cfg.tmMarkerColorTitle'), oninput: e => { m.color = e.target.value; rp(); } }),
        el('input', { type: 'text', value: m.text, style: 'flex:1', oninput: e => { m.text = e.target.value; rp(); } }),
        el('button', { class: 'small danger', onclick: () => { cfg.textMarkers.splice(i, 1); renderLabelLists(); rp(); } }, '×'),
      ));
    });
  };
  renderLabelLists();
  gLabel.append(
    ...(isBar ? [] : [   // 막대의 값 표시는 "막대 옵션"에서 — 텍스트 마커 목록만 유지
      row(t('cfg.show'), el('input', { type: 'checkbox', ...(cfg.showLabels ? { checked: '' } : {}), onchange: e => { cfg.showLabels = e.target.checked; rp(); } })),
      row(t('cfg.labelCol'), colSelect(cfg, 'labelCol', { emptyLabel: t('opt.auto') })),
      el('div', { class: 'hint' }, t('cfg.labelHint')),
      hiddenBox,
    ]),
    markerBox,
  );

  /* --- 베이스라인 --- */
  const gBase = el('details', { class: 'grp' }, el('summary', {}, tf('cfg.baselineCount', { n: cfg.baselines.length })));
  const baseBox = el('div');
  const renderBaseList = () => {
    baseBox.innerHTML = '';
    cfg.baselines.forEach((b, i) => {
      baseBox.append(el('div', { class: 'series-row' },
        el('span', { class: 'sname', title: `(${b.x}, ${b.y})` }, `(${b.x}, ${b.y})`),
        select([['none', t('opt.shadeNone')], ['ur', t('opt.shadeUR')], ['ul', t('opt.shadeUL')], ['lr', t('opt.shadeLR')], ['ll', t('opt.shadeLL')]], b.shade || 'none', v => { b.shade = v; rp(); }),
        el('button', { class: 'small danger', onclick: () => { cfg.baselines.splice(i, 1); renderBaseList(); rp(); } }, '×'),
      ));
    });
    gBase.querySelector('summary').textContent = tf('cfg.baselineCount', { n: cfg.baselines.length });
  };
  renderBaseList();
  cfg._refreshLists = () => { renderBaseList(); renderLabelLists(); };
  gBase.append(
    el('div', { class: 'hint' }, t('cfg.baselineHint')),
    baseBox,
  );

  /* --- 고급 --- */
  const gAdv = el('details', { class: 'grp' }, el('summary', {}, t('cfg.advanced')));
  gAdv.append(
    row(t('cfg.trend'), select([['none', t('opt.none')], ['linear', t('opt.trendLinear')], ['poly2', t('opt.trendPoly2')], ['log', t('opt.trendLog')], ['exp', t('opt.trendExp')], ['power', t('opt.trendPower')], ['movavg', t('opt.trendMovavg')]], cfg.trend, v => { cfg.trend = v; rp(); })),
    row(t('cfg.trendStyle'), select(DASHES(), cfg.trendDash, v => { cfg.trendDash = v; rp(); }),
        el('input', { type: 'number', value: cfg.trendWidth, min: 0.5, max: 10, step: 0.5, title: t('cfg.trendWidthTitle'), oninput: e => { cfg.trendWidth = Number(e.target.value) || 1.5; rp(); } })),
    row(t('cfg.errorBand'), select([['none', t('opt.none')], ['1', t('opt.band1')], ['2', t('opt.band2')]], cfg.trendBand, v => { cfg.trendBand = v; rp(); })),
    el('div', { class: 'hint' }, t('cfg.trendHint')),
    row('Pareto', el('input', { type: 'checkbox', ...(cfg.pareto ? { checked: '' } : {}), onchange: e => { cfg.pareto = e.target.checked; rp(); } })),
    row(t('cfg.paretoDir'), select([['min-x-max-y', t('opt.paretoMinMax')], ['max-x-max-y', t('opt.paretoMaxMax')], ['min-x-min-y', t('opt.paretoMinMin')], ['max-x-min-y', t('opt.paretoMaxMin')]], cfg.paretoDir, v => { cfg.paretoDir = v; rp(); })),
  );

  // 고급(추세선·Pareto)은 산점/선 전용 — 막대에서는 숨김
  panel.append(gData, ...(gBar ? [gBar] : []), gFilter, gAxis, gStyle, gLabel, gBase, ...(isBar ? [] : [gAdv]));

  function rebuild() { renderSeries(); }
}
function exportImg(cfg, format) {
  const div = plotDivs[cfg.id];
  if (!div || !div.data) { alert(t('err.drawChartFirst')); return; }
  Plotly.downloadImage(div, { format, width: div.clientWidth * 1.0 || 900, height: div.clientHeight || 480, scale: format === 'png' ? 3 : 1, filename: (cfg.title || `chart-${cfg.id}`).replace(/\s+/g, '_') });
}
function addChart(cfgOverride) {
  const cfg = { ...defaultChart(), ...(cfgOverride || {}) };
  // sensible defaults: y는 점수형(score/acc/f1), x는 비용형(token/latency/cost) 컬럼 우선
  if (!cfg.x || !cfg.y) {
    const nums = numericColumns();
    const yGuess = nums.find(c => /score|acc|f1|auc|bleu|rouge|prec|recall/i.test(c));
    const xGuess = nums.find(c => c !== yGuess && /token|budget|latency|time|cost|frame|step|size|param/i.test(c));
    if (!cfg.x) cfg.x = xGuess || nums.find(c => c !== yGuess) || nums[0] || '';
    if (!cfg.y) cfg.y = yGuess || nums.find(c => c !== cfg.x) || '';
    const cats = columns().filter(c => !nums.includes(c) && c !== '_source');
    if (!cfg.group && cats[0]) cfg.group = cats[0];
  }
  state.charts.push(cfg);
  refreshCharts();
  save();
  return cfg;
}
function serializableChart(c) {
  return Object.fromEntries(Object.entries(c).filter(([k, v]) => !k.startsWith('_') && typeof v !== 'function'));
}
function duplicateChart(src) {
  const copy = JSON.parse(JSON.stringify(serializableChart(src)));
  copy.id = state.nextId++;
  copy.title = src.title ? src.title + t('card.copySuffix') : '';
  state.charts.push(copy);
  refreshCharts(); save();
}
function removeChart(id) {
  state.charts = state.charts.filter(c => c.id !== id);
  delete plotDivs[id];
  refreshCharts(); save();
}
function refreshCharts() {
  const box = document.getElementById('charts');
  box.innerHTML = '';
  for (const cfg of state.charts) box.append(renderChartCard(cfg));
  document.getElementById('emptyCharts').style.display = state.charts.length ? 'none' : '';
  for (const cfg of state.charts) renderPlot(cfg);
}

/* ================= data table ================= */
const tableState = { search: '', sortCol: null, sortDir: 1, page: 0, pageSize: 200 };
function renderTable() {
  const cols = visibleColumns();
  const table = document.getElementById('dataTable');
  let rows = allRows();
  const q = tableState.search.trim().toLowerCase();
  if (q) rows = rows.filter(r => cols.some(c => r[c] !== null && r[c] !== undefined && String(r[c]).toLowerCase().includes(q)));
  if (tableState.sortCol) {
    const c = tableState.sortCol, d = tableState.sortDir;
    rows = rows.slice().sort((a, b) => {
      const va = a[c], vb = b[c];
      if (va === null || va === undefined) return 1;
      if (vb === null || vb === undefined) return -1;
      if (typeof va === 'number' && typeof vb === 'number') return d * (va - vb);
      return d * String(va).localeCompare(String(vb));
    });
  }
  const total = rows.length;
  const pages = Math.max(1, Math.ceil(total / tableState.pageSize));
  tableState.page = Math.min(tableState.page, pages - 1);
  const start = tableState.page * tableState.pageSize;
  const view = rows.slice(start, start + tableState.pageSize);
  const allIncluded = rows.every(r => !r._excluded);

  let html = `<thead><tr><th class="chk" title="${esc(t('table.allIncludeTitle'))}"><input type="checkbox" id="chkAll"${allIncluded ? ' checked' : ''}></th>` + cols.map(c =>
    `<th data-col="${esc(c)}">${esc(c)}${tableState.sortCol === c ? (tableState.sortDir > 0 ? ' ▲' : ' ▼') : ''}</th>`).join('') + '</tr></thead><tbody>';
  view.forEach((r, i) => {
    html += `<tr class="${r._excluded ? 'excl' : ''}"><td class="chk"><input type="checkbox" data-i="${i}"${r._excluded ? '' : ' checked'}></td>`
      + cols.map(c => `<td>${r[c] === null || r[c] === undefined ? '<span style="color:#c3c2b7">–</span>' : esc(r[c])}</td>`).join('') + '</tr>';
  });
  table.innerHTML = html + '</tbody>';
  const rerenderCharts = () => { for (const c of state.charts) renderPlot(c); };
  table.querySelectorAll('th[data-col]').forEach(th => th.addEventListener('click', () => {
    const c = th.dataset.col;
    if (tableState.sortCol === c) tableState.sortDir *= -1;
    else { tableState.sortCol = c; tableState.sortDir = 1; }
    renderTable();
  }));
  table.querySelectorAll('tbody input[type="checkbox"]').forEach(cb => cb.addEventListener('change', () => {
    const r = view[Number(cb.dataset.i)];
    if (cb.checked) delete r._excluded; else r._excluded = true;
    renderTable(); rerenderCharts(); save();
  }));
  const chkAll = table.querySelector('#chkAll');
  if (chkAll) chkAll.addEventListener('change', () => {
    rows.forEach(r => { if (chkAll.checked) delete r._excluded; else r._excluded = true; });
    renderTable(); rerenderCharts(); save();
  });
  const nExcl = allRows().filter(r => r._excluded).length;
  document.getElementById('tableCount').textContent = tf('table.count', {
    total: total.toLocaleString(), cols: cols.length, all: allRows().length.toLocaleString(),
    excl: nExcl ? tf('table.exclSuffix', { n: nExcl }) : '',
  });
  const restoreBtn = document.getElementById('restoreExcl');
  restoreBtn.hidden = nExcl === 0;
  restoreBtn.textContent = tf('table.restoreExcl', { n: nExcl });
  document.getElementById('pgInfo').textContent = tf('pager.info', { page: pages ? tableState.page + 1 : 0, pages });
}

/* ================= dataset chips ================= */
function renderChips() {
  const box = document.getElementById('datasetChips');
  box.innerHTML = '';
  for (const d of state.datasets) {
    box.append(el('span', { class: 'chip' },
      d.name, el('span', { class: 'n' }, tf('chips.rows', { n: d.rows.length })),
      el('button', { title: t('btn.delete'), onclick: () => removeDataset(d.id) }, '×'),
    ));
  }
}

/* ================= session persistence ================= */
let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      const charts = state.charts.map(serializableChart);
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ datasets: state.datasets, charts, nextId: state.nextId }));
    } catch (e) { /* quota — 데이터가 너무 크면 자동저장 생략 */ }
  }, 400);
}
function loadSaved() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY));
    if (s && s.datasets) {
      restoreSession(s);
      if (!localStorage.getItem(STORAGE_KEY)) { save(); localStorage.removeItem(LEGACY_STORAGE_KEY); }
      return true;
    }
  } catch (e) {}
  return false;
}
function restoreSession(s) {
  state.datasets = s.datasets || [];
  state.charts = (s.charts || []).map(c => {
    const m = { ...defaultChart(), ...c };
    if (m.baseline) {   // 구버전 세션 마이그레이션: 단일 baseline → baselines 배열
      m.baselines = [{ x: m.baseline.x, y: m.baseline.y, shade: m.baselineShade || 'none' }];
    }
    delete m.baseline; delete m.baselineShade;
    return m;
  });
  state.nextId = s.nextId || (Math.max(0, ...state.datasets.map(d => d.id), ...state.charts.map(c => c.id)) + 1);
  onDataChanged(false);
  refreshCharts();
}
function exportSession() {
  const charts = state.charts.map(serializableChart);
  const blob = new Blob([JSON.stringify({ datasets: state.datasets, charts, nextId: state.nextId }, null, 1)], { type: 'application/json' });
  const a = el('a', { href: URL.createObjectURL(blob), download: 'vtc-visualizer-session.json' });
  a.click(); URL.revokeObjectURL(a.href);
}

/* ================= wiring ================= */
function onDataChanged(autoChart = true) {
  renderChips();
  tableState.page = 0;
  renderTable();
  if (autoChart && state.datasets.length && !state.charts.length) addChart();
  else refreshCharts();
  save();
}
async function loadFiles(files) {
  for (const f of files) {
    if (!/\.(csv|tsv|json)$/i.test(f.name)) continue;
    try {
      const text = await f.text();
      addDataset(f.name.replace(/^.*\//, ''), parseAny(text, f.name));
    } catch (e) { alert(tf('err.parseFailed', { name: f.name, msg: e.message })); }
  }
}

const dz = document.getElementById('dropzone');
['dragover', 'dragenter'].forEach(ev => document.body.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag'); }));
['dragleave', 'dragend'].forEach(ev => document.body.addEventListener(ev, e => { if (e.target === document.body || e.relatedTarget === null) dz.classList.remove('drag'); }));
document.body.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  if (e.dataTransfer && e.dataTransfer.files.length) loadFiles([...e.dataTransfer.files]);
});
document.getElementById('btnOpenFiles').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('btnOpenFolder').addEventListener('click', () => document.getElementById('folderInput').click());
document.getElementById('fileInput').addEventListener('change', e => { loadFiles([...e.target.files]); e.target.value = ''; });
document.getElementById('folderInput').addEventListener('change', e => { loadFiles([...e.target.files]); e.target.value = ''; });

document.getElementById('btnPaste').addEventListener('click', () => document.getElementById('modalBack').classList.add('show'));
document.getElementById('pasteCancel').addEventListener('click', () => document.getElementById('modalBack').classList.remove('show'));
document.getElementById('pasteAdd').addEventListener('click', () => {
  const name = document.getElementById('pasteName').value.trim() || `pasted-${state.datasets.length + 1}`;
  const text = document.getElementById('pasteText').value;
  try {
    addDataset(name, parseAny(text, name));
    document.getElementById('modalBack').classList.remove('show');
    document.getElementById('pasteText').value = ''; document.getElementById('pasteName').value = '';
  } catch (e) { alert(tf('err.parseFailedGeneric', { msg: e.message })); }
});
document.getElementById('modalBack').addEventListener('click', e => { if (e.target.id === 'modalBack') e.target.classList.remove('show'); });

document.getElementById('btnAddChart').addEventListener('click', () => addChart());
document.getElementById('btnExportSession').addEventListener('click', exportSession);
document.getElementById('btnImportSession').addEventListener('click', () => {
  const inp = el('input', { type: 'file', accept: '.json' });
  inp.addEventListener('change', async () => {
    try { restoreSession(JSON.parse(await inp.files[0].text())); save(); }
    catch (e) { alert(tf('err.sessionReadFailed', { msg: e.message })); }
  });
  inp.click();
});
document.getElementById('btnReset').addEventListener('click', () => {
  if (!confirm(t('confirm.resetAll'))) return;
  localStorage.removeItem(STORAGE_KEY);
  state.datasets = []; state.charts = []; state.nextId = 1;
  onDataChanged(false); refreshCharts();
});
document.getElementById('restoreExcl').addEventListener('click', () => {
  allRows().forEach(r => { delete r._excluded; });
  renderTable();
  for (const c of state.charts) renderPlot(c);
  save();
});
document.getElementById('tableSearch').addEventListener('input', e => { tableState.search = e.target.value; tableState.page = 0; renderTable(); });
document.getElementById('pgPrev').addEventListener('click', () => { tableState.page = Math.max(0, tableState.page - 1); renderTable(); });
document.getElementById('pgNext').addEventListener('click', () => { tableState.page += 1; renderTable(); });
document.getElementById('btnLangToggle').addEventListener('click', () => {
  LANG = LANG === 'ko' ? 'en' : 'ko';
  localStorage.setItem(LANG_KEY, LANG);
  applyLang();
  refreshCharts(); renderTable(); renderChips();
});

/* visualizer.py 서버가 있으면 폴더의 csv/json을 자동 로드 */
async function tryServerAutoload() {
  if (!/^https?:$/.test(location.protocol)) return;
  try {
    const res = await fetch('api/files');
    if (!res.ok) return;
    const files = await res.json();
    for (const name of files) {
      if (state.datasets.some(d => d.name === name)) continue;
      const r = await fetch('api/file?name=' + encodeURIComponent(name));
      if (r.ok) {
        try { addDataset(name, parseAny(await r.text(), name)); }
        catch (e) { console.warn('자동 로드 실패:', name, e); }
      }
    }
  } catch (e) { /* 서버 없음 — 정상 */ }
}

/* ================= init ================= */
applyLang();
loadSaved();
renderChips(); renderTable(); refreshCharts();
tryServerAutoload();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTC Visualizer</title>
<link rel="icon" href="data:,">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  /* ===== chart chrome & ink tokens (dataviz reference palette, light) ===== */
  :root {
    color-scheme: light;
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --ink-1: #0b0b0b;
    --ink-2: #52514e;
    --ink-muted: #898781;
    --grid: #e1e0d9;
    --axis: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --accent: #2a78d6;
    --danger: #d03b3b;
    --hover: #eef4fd;
    --font: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  /* 다크 테마 토큰 — 단순 반전이 아니라 다크 서피스에 맞춘 값. OS 선호를 기본으로, 토글이 양방향 오버라이드 */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      color-scheme: dark;
      --surface-1: #202226; --page: #16171a; --ink-1: #ececed; --ink-2: #b7b8bb; --ink-muted: #8a8b8f;
      --grid: #34363b; --axis: #4a4c52; --border: rgba(255,255,255,0.13); --accent: #5a9ef0; --danger: #f2635f; --hover: #223247;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --surface-1: #202226; --page: #16171a; --ink-1: #ececed; --ink-2: #b7b8bb; --ink-muted: #8a8b8f;
    --grid: #34363b; --axis: #4a4c52; --border: rgba(255,255,255,0.13); --accent: #5a9ef0; --danger: #f2635f; --hover: #223247;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--page); color: var(--ink-1);
    font-family: var(--font); font-size: 14px; line-height: 1.5;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 16px 20px 60px; }
  :root[data-width="wide"] .wrap { max-width: 1660px; }
  :root[data-width="full"] .wrap { max-width: none; }

  header.app {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 0 16px;
  }
  header.app h1 { font-size: 20px; margin: 0; font-weight: 700; }
  header.app .sub { color: var(--ink-muted); font-size: 12px; margin-right: auto; }

  button, select, input[type="text"], input[type="number"], input[type="search"], textarea {
    font-family: var(--font); font-size: 13px; color: var(--ink-1);
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 9px;
  }
  button { cursor: pointer; }
  button:hover { border-color: var(--ink-muted); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { filter: brightness(0.94); }
  button.ghost { background: transparent; }
  button.danger { color: var(--danger); }
  button.small { font-size: 12px; padding: 3px 7px; }
  input[type="color"] { width: 30px; height: 24px; padding: 1px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface-1); cursor: pointer; }
  label.inline { display: inline-flex; align-items: center; gap: 5px; color: var(--ink-2); }

  section.card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 16px;
  }
  section.card h2 { font-size: 13px; margin: 0 0 10px; color: var(--ink-2); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

  /* ===== data input ===== */
  #dropzone {
    border: 1.5px dashed var(--axis); border-radius: 8px;
    padding: 18px; text-align: center; color: var(--ink-muted);
    transition: background .15s, border-color .15s;
  }
  #dropzone.drag { background: var(--hover); border-color: var(--accent); color: var(--accent); }
  #dropzone .btns { margin-top: 8px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  #datasetChips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--hover); border: 1px solid var(--border); border-radius: 999px;
    padding: 2px 6px 2px 10px; font-size: 12px;
  }
  .chip .n { color: var(--ink-muted); }
  .chip button { border: none; background: none; padding: 0 4px; color: var(--ink-muted); font-size: 13px; }
  .chip button:hover { color: var(--danger); }

  /* ===== chart cards ===== */
  #charts { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
  .chart-card { padding: 0; overflow: hidden; margin-bottom: 0; flex: 1 1 100%; }
  .chart-card.half { flex-basis: calc(50% - 8px); }
  @media (max-width: 860px) { .chart-card.half { flex-basis: 100%; } }
  .chart-card .head {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-bottom: 1px solid var(--border); background: var(--surface-1);
  }
  .chart-card .head .name { font-weight: 600; margin-right: auto; font-size: 14px; }
  .chart-card .body { display: flex; align-items: stretch; }
  .chart-card .cfg {
    width: 292px; flex: none; border-right: 1px solid var(--border);
    padding: 10px 12px; overflow-y: auto; max-height: 640px; font-size: 13px;
  }
  .chart-card .cfg.hidden { display: none; }
  .chart-card .plot { flex: 1; min-width: 0; min-height: 460px; }
  .chart-card .plot-hint { padding: 5px 12px; font-size: 11px; color: var(--ink-muted); border-top: 1px solid var(--grid); }
  details.grp { margin-bottom: 8px; border-bottom: 1px solid var(--grid); padding-bottom: 8px; }
  details.grp summary { cursor: pointer; font-weight: 600; color: var(--ink-2); font-size: 12.5px; padding: 3px 0; user-select: none; }
  .row { display: flex; align-items: center; gap: 6px; margin: 6px 0; flex-wrap: wrap; }
  .row > span.lbl { width: 74px; flex: none; color: var(--ink-muted); font-size: 12px; }
  .row select, .row input[type="text"] { flex: 1; min-width: 60px; }
  .row input[type="number"] { width: 74px; }
  .hint { color: var(--ink-muted); font-size: 11.5px; margin: 4px 0; }
  .filter-row { display: flex; gap: 4px; margin: 4px 0; align-items: center; }
  .filter-row select { flex: 1; min-width: 40px; }
  .filter-row .op { flex: none; width: 62px; }
  .filter-row input { flex: 1; width: 50px; min-width: 40px; }
  .filter-vals { display: flex; flex-wrap: wrap; gap: 2px 12px; margin: 2px 0 8px 6px; }
  .filter-vals label.inline { font-size: 12px; gap: 4px; }
  .series-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
  .series-row .sname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
  .series-row .slabel { flex: 1; min-width: 0; font-size: 12px; }
  .series-row select { width: 92px; flex: none; }
  .series-row input[type="number"] { width: 52px; }
  .series-block { margin: 6px 0; padding-bottom: 4px; border-bottom: 1px dashed var(--grid); }
  .series-block:last-child { border-bottom: none; }
  .series-row.sub { margin: 2px 0 0 10px; }
  .series-row.sub select { flex: 1; width: auto; min-width: 0; }
  .series-row.sub input[type="number"] { width: 46px; flex: none; }

  /* ===== data table ===== */
  #tableCtrl { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  #tableCtrl input[type="search"] { width: 240px; }
  #tableCtrl .count { color: var(--ink-muted); font-size: 12px; }
  #tableWrap { overflow: auto; max-height: 480px; border: 1px solid var(--grid); border-radius: 8px; }
  table.data { border-collapse: collapse; width: 100%; font-size: 12.5px; font-variant-numeric: tabular-nums; }
  table.data th, table.data td { padding: 5px 10px; border-bottom: 1px solid var(--grid); text-align: left; white-space: nowrap; }
  table.data th {
    position: sticky; top: 0; background: var(--surface-1); cursor: pointer;
    color: var(--ink-2); font-weight: 600; user-select: none; border-bottom: 1px solid var(--axis);
  }
  table.data th:hover { color: var(--accent); }
  table.data tr:hover td { background: var(--hover); }
  #pager { display: flex; gap: 8px; align-items: center; margin-top: 8px; color: var(--ink-muted); font-size: 12px; }

  /* ===== modal ===== */
  #modalBack {
    display: none; position: fixed; inset: 0; background: rgba(11,11,11,0.35); z-index: 50;
    align-items: center; justify-content: center;
  }
  #modalBack.show { display: flex; }
  #pasteModal {
    background: var(--surface-1); border-radius: 10px; padding: 18px; width: min(680px, 92vw);
    display: flex; flex-direction: column; gap: 10px;
  }
  #pasteModal textarea { width: 100%; height: 240px; font-family: ui-monospace, monospace; font-size: 12px; resize: vertical; }

  /* ===== point-click popover ===== */
  #ptPopover {
    display: none; position: fixed; z-index: 60; min-width: 180px;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 4px 16px rgba(11,11,11,0.14); padding: 6px;
  }
  #ptPopover.show { display: flex; flex-direction: column; gap: 4px; }
  #ptPopover .pp-title { font-size: 11.5px; color: var(--ink-muted); padding: 2px 4px; font-variant-numeric: tabular-nums; }
  #ptPopover .pp-note { font-size: 10.5px; color: var(--ink-muted); padding: 2px 4px 0; border-top: 1px solid var(--grid); }
  #ptPopover button { text-align: left; border: none; padding: 6px 8px; border-radius: 6px; }
  #ptPopover button:hover { background: var(--hover); }
  #ptPopover .pp-row { display: flex; gap: 4px; }
  #ptPopover .pp-row button { flex: 1; text-align: center; border: 1px solid var(--border); }
  #ptPopover input[type="text"] { width: 100%; }

  /* ===== data table: include/exclude ===== */
  table.data th.chk, table.data td.chk { width: 30px; text-align: center; padding: 5px 6px; cursor: default; }
  table.data tr.excl td:not(.chk) { opacity: 0.4; }
  table.data tr.muted td:not(.chk) { opacity: 0.55; font-style: italic; }

  /* ===== toast ===== */
  #toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(10px);
    background: var(--ink-1); color: var(--surface-1); border-radius: 8px; padding: 9px 14px;
    display: flex; gap: 12px; align-items: center; font-size: 13px;
    opacity: 0; pointer-events: none; transition: opacity .18s, transform .18s; z-index: 70;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  #toast button { background: none; border: none; color: #8db9ee; font-weight: 600; padding: 0; }
  #toast button:hover { text-decoration: underline; }

  footer { color: var(--ink-muted); font-size: 12px; text-align: center; margin-top: 24px; }
  h1 .ver { font-size: 12px; font-weight: 600; color: var(--ink-muted); vertical-align: 6px;
            border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; margin-left: 2px; }
  #emptyCharts { color: var(--ink-muted); text-align: center; padding: 30px 0; }
  @media (max-width: 860px) {
    .chart-card .body { flex-direction: column; }
    .chart-card .cfg { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 320px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <h1>VTC Visualizer <span id="appVersion" class="ver"></span></h1>
    <span class="sub" data-i18n="header.sub"></span>
    <button id="btnAddChart" class="primary" data-i18n="btn.addChart"></button>
    <button id="btnExportSession" data-i18n="btn.exportSession"></button>
    <button id="btnImportSession" data-i18n="btn.importSession"></button>
    <button id="btnExportAll" data-i18n="btn.exportAll"></button>
    <button id="btnReset" class="danger ghost" data-i18n="btn.reset"></button>
    <button id="btnWidth" class="ghost" title=""></button>
    <button id="btnTheme" class="ghost" title=""></button>
    <button id="btnLangToggle" class="ghost"></button>
  </header>

  <section class="card">
    <h2 data-i18n="section.dataInput"></h2>
    <div id="dropzone">
      <span data-i18n="dropzone.text"></span>
      <div class="btns">
        <button id="btnOpenFiles" data-i18n="btn.openFiles"></button>
        <button id="btnOpenFolder" data-i18n="btn.openFolder"></button>
        <button id="btnPaste" data-i18n="btn.paste"></button>
      </div>
    </div>
    <div id="datasetChips"></div>
    <details id="derivedPanel" class="grp" hidden></details>
    <input type="file" id="fileInput" accept=".csv,.json,.tsv" multiple hidden>
    <input type="file" id="folderInput" webkitdirectory multiple hidden>
  </section>

  <div id="charts"></div>
  <div id="emptyCharts" data-i18n="emptyCharts.text"></div>

  <section class="card">
    <h2 data-i18n="section.rawData"></h2>
    <div id="tableCtrl">
      <input type="search" id="tableSearch" data-i18n-ph="table.searchPh">
      <span class="count" id="tableCount"></span>
      <button class="small" id="restoreExcl" hidden data-i18n="table.restoreExcl"></button>
      <button class="small" id="restoreMuted" hidden data-i18n="table.restoreMuted"></button>
      <button class="small" id="btnExportCsv" data-i18n="btn.exportCsv"></button>
    </div>
    <div id="tableWrap"><table class="data" id="dataTable"></table></div>
    <div id="pager">
      <button class="small" id="pgPrev" data-i18n="pager.prev"></button>
      <span id="pgInfo"></span>
      <button class="small" id="pgNext" data-i18n="pager.next"></button>
    </div>
  </section>

  <footer>VTC Visualizer <span class="footer-ver"></span> — <span data-i18n="footer.text"></span> © mrc</footer>
</div>

<div id="modalBack">
  <div id="pasteModal">
    <strong data-i18n="modal.title"></strong>
    <div class="row"><span class="lbl" data-i18n="modal.datasetName"></span><input type="text" id="pasteName" data-i18n-ph="modal.datasetNamePh"></div>
    <textarea id="pasteText" data-i18n-ph="modal.pasteTextPh"></textarea>
    <div class="row" style="justify-content:flex-end">
      <button id="pasteCancel" data-i18n="btn.cancel"></button>
      <button id="pasteAdd" class="primary" data-i18n="btn.add"></button>
    </div>
  </div>
</div>

<script>
'use strict';
/* =====================================================================
 * VTC Visualizer — 범용 벤치마크/성능 비교 시각화 도구 (단일 파일) © mrc
 * 데이터 계약: CSV(헤더+행) 또는 JSON 객체 배열. 필수 컬럼 없음.
 * 각 파일에는 _source 컬럼(파일명)이 자동 부여된다.
 * ===================================================================== */

/* 릴리스 시 이 상수를 올리고 같은 이름의 git 태그(v0.2 등)를 함께 만든다 — 표시는 헤더·푸터 자동 */
const APP_VERSION = 'v0.9';

/* ---- validated categorical palette (dataviz reference, light mode, fixed order) ---- */
/* 카테고리 팔레트 — 라이트는 dataviz 검증본. 다크는 같은 hue 유지하되 다크 서피스에서
 * 대비가 낮은 진초록(#008300)·진보라(#4a3aa7)를 같은 계열의 밝은 스텝으로 올림(정체성 보존). */
const LIGHT_PALETTE = ['#2a78d6', '#008300', '#e87ba4', '#eda100', '#1baf7a', '#eb6834', '#4a3aa7', '#e34948'];
const DARK_PALETTE = ['#5a9ef0', '#3cb85a', '#ef8fb3', '#f0b53a', '#2fc891', '#f0784a', '#9a8cf0', '#f2635f'];
let PALETTE = LIGHT_PALETTE.slice();
/* 연속 색상용 단일-hue 시퀀셜 — 라이트는 밝음→어두움, 다크는 어두움→밝음(높은 값이 밝게) */
const LIGHT_SEQ = [[0, '#eaf2fb'], [0.35, '#9cc4ee'], [0.7, '#3d84d6'], [1, '#12467f']];
const DARK_SEQ = [[0, '#16324f'], [0.35, '#2f6fb5'], [0.7, '#5aa0ea'], [1, '#bcdcfa']];
let SEQ_SCALE = LIGHT_SEQ;
const SYMBOLS = ['circle', 'square', 'diamond', 'triangle-up', 'cross', 'x', 'star', 'triangle-down'];
/* 차트 크롬 토큰 — 테마별. `CHROME`은 applyTheme()가 Object.assign으로 갱신(참조 유지) */
const LIGHT_CHROME = { surface: '#fcfcfb', ink: '#0b0b0b', ink2: '#52514e', muted: '#898781', grid: '#e1e0d9', axis: '#c3c2b7', overlay: 'rgba(252,252,251,0.82)' };
const DARK_CHROME = { surface: '#202226', ink: '#ececed', ink2: '#b7b8bb', muted: '#8a8b8f', grid: '#34363b', axis: '#4a4c52', overlay: 'rgba(32,34,38,0.82)' };
const CHROME = { ...LIGHT_CHROME };
function inkOf(cfg) { return cfg.fontColor || CHROME.ink; }   // fontColor 빈 값 = 테마 잉크 자동
const FONTS = [
  'system-ui, -apple-system, "Segoe UI", sans-serif',
  'Helvetica, Arial, sans-serif',
  '"Times New Roman", Times, serif',
  'Georgia, serif',
  '"Courier New", ui-monospace, monospace',
];
const STORAGE_KEY = 'vtc-visualizer:session';
const LEGACY_STORAGE_KEY = 'visualizer-by-mrc:session';   // 구버전 세션 마이그레이션용

/* ================= i18n ================= */
const LANG_KEY = 'vtc-visualizer:lang';
let LANG = localStorage.getItem(LANG_KEY) === 'en' ? 'en' : 'ko';
/* ===== 테마(라이트/다크) ===== */
const THEME_KEY = 'vtc-visualizer:theme';
let THEME = localStorage.getItem(THEME_KEY) || 'auto';   // auto(OS 따름) | light | dark
function effectiveDark() {
  if (THEME === 'dark') return true;
  if (THEME === 'light') return false;
  return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
}
function applyTheme() {
  const dark = effectiveDark();
  if (THEME === 'auto') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', THEME);
  Object.assign(CHROME, dark ? DARK_CHROME : LIGHT_CHROME);   // 참조 유지 — 렌더 시점에 반영
  PALETTE = (dark ? DARK_PALETTE : LIGHT_PALETTE).slice();
  SEQ_SCALE = dark ? DARK_SEQ : LIGHT_SEQ;
  const b = document.getElementById('btnTheme');
  if (b) { b.textContent = dark ? '☀️' : '🌙'; b.title = t('theme.toggle'); }
  for (const c of state.charts) if (plotDivs[c.id]) renderPlot(c);
}
function toggleTheme() {
  THEME = effectiveDark() ? 'light' : 'dark';   // 현재 상태를 뒤집어 명시적으로 고정
  localStorage.setItem(THEME_KEY, THEME);
  applyTheme();
}
/* ===== 페이지 폭(좌우) ===== */
const WIDTH_KEY = 'vtc-visualizer:width';
const WIDTHS = ['normal', 'wide', 'full'];
let WIDTH = WIDTHS.includes(localStorage.getItem(WIDTH_KEY)) ? localStorage.getItem(WIDTH_KEY) : 'normal';
function applyWidth() {
  if (WIDTH === 'normal') document.documentElement.removeAttribute('data-width');
  else document.documentElement.setAttribute('data-width', WIDTH);
  const b = document.getElementById('btnWidth');
  if (b) b.textContent = tf('width.label', { mode: t('width.' + WIDTH) });
  requestAnimationFrame(() => { for (const c of state.charts) { const gd = plotDivs[c.id]; if (gd && gd.data) Plotly.Plots.resize(gd); } });
}
function cycleWidth() {
  WIDTH = WIDTHS[(WIDTHS.indexOf(WIDTH) + 1) % WIDTHS.length];
  localStorage.setItem(WIDTH_KEY, WIDTH);
  applyWidth();
}
const I18N = {
  ko: {
    'header.sub': 'CSV/JSON 벤치마크·성능 비교 인터랙티브 시각화',
    'btn.addChart': '＋ 차트 추가',
    'btn.exportSession': '세션 내보내기',
    'btn.importSession': '세션 가져오기',
    'btn.reset': '전체 초기화',
    'section.dataInput': '데이터 입력',
    'dropzone.text': 'CSV / JSON 파일을 여기에 드래그 앤 드랍하세요 (여러 개 가능)',
    'btn.openFiles': '파일 열기…',
    'btn.openFolder': '폴더 열기…',
    'btn.paste': '직접 입력…',
    'emptyCharts.text': '데이터를 추가하면 첫 차트가 자동으로 생성됩니다. 또는 ＋ 차트 추가를 누르세요.',
    'section.rawData': '원본 데이터',
    'table.searchPh': '검색…',
    'table.restoreExcl': '제외 {n}행 모두 복원',
    'pager.prev': '◀ 이전',
    'pager.next': '다음 ▶',
    'modal.title': '데이터 직접 입력',
    'modal.datasetName': '데이터셋 이름',

  }
  if (field !== '' || row.length) { pushF(); pushR(); }

    if (j && !Array.isArray(j) && Array.isArray(j.datasets) && Array.isArray(j.charts)) {
      throw new Error(t('err.sessionAsData'));
    }
    if (!Array.isArray(j)) {

    // 차트 안 사분면
    'inside-tl': { orientation: 'v', x: 0.02, y: 0.98, xanchor: 'left', yanchor: 'top', bgcolor: insideBg },
    'inside-tr': { orientation: 'v', x: 0.98, y: 0.98, xanchor: 'right', yanchor: 'top', bgcolor: insideBg },
    'inside-bl': { orientation: 'v', x: 0.02, y: 0.02, xanchor: 'left', yanchor: 'bottom', bgcolor: insideBg },
    'inside-br': { orientation: 'v', x: 0.98, y: 0.02, xanchor: 'right', yanchor: 'bottom', bgcolor: insideBg },
    inside: { orientation: 'v', x: 0.02, y: 0.98, xanchor: 'left', yanchor: 'top', bgcolor: insideBg },  // 구 세션 호환(좌상단)
  }[cfg.legendPos];
  const axis = (label, scale, mn, mx, col) => {
    // 문자열 컬럼은 category 축 — 막대 정렬(categoryorder)과 문자열 X 산점도가 올바르게 동작
    const sample = chartRows(cfg).map(r => r[col]).filter(v => v !== null && v !== undefined);
    const isCat = (sample.length > 0 && sample.some(v => typeof v !== 'number'))
      || (cfg.type === 'bar' && cfg.barCatX && col === cfg.x);   // "X를 카테고리로" 옵션
    const a = {
      title: { text: label || col, font: { family: cfg.fontFamily, size: cfg.fontSize + 1, color: inkOf(cfg)} },
      type: isCat ? 'category' : (scale === 'log' ? 'log' : 'linear'),
      showgrid: cfg.grid, gridcolor: CHROME.grid, gridwidth: 1,
      zeroline: false, linecolor: CHROME.axis, linewidth: 1,
      tickfont: { family: cfg.fontFamily, size: cfg.fontSize - 1, color: CHROME.muted },
      ticks: 'outside', tickcolor: CHROME.axis, mirror: false, automargin: true,
    };
    const lo = coerce(mn), hi = coerce(mx);
    const hasLo = typeof lo === 'number', hasHi = typeof hi === 'number';
    if ((hasLo || hasHi) && !isCat) {   // 한쪽만 입력해도 동작 — 빈 쪽은 데이터 범위(±5%)로 채움 (category 축은 무시)
      const vals = chartRows(cfg).map(r => r[col]).filter(v => typeof v === 'number');
      if (scale === 'log') {
        const pos = vals.filter(v => v > 0);
        const pmin = pos.length ? Math.min(...pos) : 0.1, pmax = pos.length ? Math.max(...pos) : 10;
        const r0 = hasLo && lo > 0 ? lo : pmin / 1.2;
        const r1 = hasHi && hi > 0 ? hi : pmax * 1.2;
        a.range = [logv(r0), logv(r1)];
      } else {
        const dmin = vals.length ? Math.min(...vals) : 0, dmax = vals.length ? Math.max(...vals) : 1;
        const pad = (dmax - dmin) * 0.05 || Math.abs(dmax) * 0.05 || 1;
        a.range = [hasLo ? lo : dmin - pad, hasHi ? hi : dmax + pad];
      }
      a.autorange = false;
    }
    return a;
  };
  // 가로 막대: 카테고리(X 설정)가 y축, 값(Y 설정)이 x축에 놓인다
  const horizBar = cfg.type === 'bar' && cfg.barOrient === 'h';
  const xaxis = horizBar ? axis(cfg.yLabel, cfg.yScale, cfg.yMin, cfg.yMax, cfg.y)
                         : axis(cfg.xLabel, cfg.xScale, cfg.xMin, cfg.xMax, cfg.x);
  const yaxis = horizBar ? axis(cfg.xLabel, cfg.xScale, cfg.xMin, cfg.xMax, cfg.x)
                         : axis(cfg.yLabel, cfg.yScale, cfg.yMin, cfg.yMax, cfg.y);
  if (cfg.type === 'bar') {
    const catOrder = { label: 'category ascending', asc: 'total ascending', desc: 'total descending' }[cfg.barSort];
    if (catOrder) (horizBar ? yaxis : xaxis).categoryorder = catOrder;
  }
  // facet(작은 다중 차트): 값별 subplot 격자. 베이스라인·텍스트마커·포인트레이블은 좌표 모호로 비활성
  if (cfg.facetBy) {
    const vals = facetValues(cfg), n = vals.length || 1;
    const cols = cfg.facetCols > 0 ? cfg.facetCols : Math.min(n, Math.max(1, Math.ceil(Math.sqrt(n))));
    const rowsN = Math.ceil(n / cols);
    const lay = {
      title: cfg.title ? { text: cfg.title, font: { family: cfg.fontFamily, size: cfg.fontSize + 4, color: inkOf(cfg)}, x: 0.5 } : undefined,
      font: { family: cfg.fontFamily, size: cfg.fontSize, color: inkOf(cfg)},
      paper_bgcolor: CHROME.surface, plot_bgcolor: CHROME.surface,
      grid: { rows: rowsN, columns: cols, pattern: 'independent', roworder: 'top to bottom' },
      showlegend: cfg.legendPos !== 'none' && (seriesDefs(cfg).length > 1 || cfg.pareto),
      legend: legend ? { ...legend, traceorder: 'normal' } : undefined,
      margin: { l: 64, r: (cfg.legendPos === 'right' || /^inside/.test(cfg.legendPos) || cfg.legendPos === 'none') ? 8 : 40, t: (cfg.title ? 52 : 30) + 6, b: 52 },
      barmode: cfg.barMode || 'group', bargap: 0.25, bargroupgap: 0.08,
      uirevision: [cfg.id, cfg.type, cfg.facetBy, cfg.facetCols, cfg.x, cfg.y, cfg.xScale, cfg.yScale].join('|'),
    };
    const anns = [];
    vals.forEach((v, i) => {
      const sfx = i === 0 ? '' : String(i + 1);
      const rowIdx = Math.floor(i / cols), colIdx = i % cols;
      const xa = horizBar ? axis(cfg.yLabel, cfg.yScale, cfg.yMin, cfg.yMax, cfg.y) : axis(cfg.xLabel, cfg.xScale, cfg.xMin, cfg.xMax, cfg.x);
      const ya = horizBar ? axis(cfg.xLabel, cfg.xScale, cfg.xMin, cfg.xMax, cfg.x) : axis(cfg.yLabel, cfg.yScale, cfg.yMin, cfg.yMax, cfg.y);
      if (rowIdx !== rowsN - 1) xa.title = undefined;   // 가장자리에만 축 제목
      if (colIdx !== 0) ya.title = undefined;
      lay['xaxis' + sfx] = xa; lay['yaxis' + sfx] = ya;
      anns.push({ text: `${cfg.facetBy} = ${v}`, xref: 'x' + sfx + ' domain', yref: 'y' + sfx + ' domain', x: 0.5, y: 1, yanchor: 'bottom',
        showarrow: false, font: { family: cfg.fontFamily, size: cfg.fontSize, color: inkOf(cfg)} });
    });
    lay.annotations = anns;
    return lay;
  }
  return {
    title: cfg.title ? { text: cfg.title, font: { family: cfg.fontFamily, size: cfg.fontSize + 4, color: inkOf(cfg)}, x: 0.5 } : undefined,
    font: { family: cfg.fontFamily, size: cfg.fontSize, color: inkOf(cfg)},
    paper_bgcolor: CHROME.surface, plot_bgcolor: CHROME.surface,
    xaxis, yaxis,
    showlegend: cfg.legendPos !== 'none' && (seriesDefs(cfg).length > 1 || cfg.pareto),
    legend: legend ? { ...legend, traceorder: 'normal' } : undefined,
    margin: { l: 64, r: (cfg.legendPos === 'right' || /^inside/.test(cfg.legendPos) || cfg.legendPos === 'none') ? 8 : 40, t: cfg.title ? 52 : 28, b: 56 },
    hovermode: 'closest',
    annotations: buildAnnotations(cfg),
    shapes: baselineShapes(cfg, gd),
    barmode: cfg.barMode || 'group', bargap: 0.25, bargroupgap: 0.08,
    // 스타일 변경 시 줌/팬 유지 — 축·범위·스케일·차트 유형/막대 방향이 바뀔 때만 뷰 리셋
    uirevision: [cfg.id, cfg.type, cfg.barOrient, cfg.x, cfg.y, cfg.xScale, cfg.yScale, cfg.xMin, cfg.xMax, cfg.yMin, cfg.yMax].join('|'),
  };
}

function renderPlot(cfg) {
  const div = plotDivs[cfg.id];
  if (!div) return;
  if (!cfg.x || !cfg.y || !allRows().length) {
    Plotly.purge(div);
    div.innerHTML = `<div style="padding:40px;color:#898781;text-align:center">${esc(t('plot.placeholder'))}</div>`;
    div._vizBound = false;   // purge가 이벤트 에미터를 제거하므로 재바인딩 필요
    return;
  }
  const gd = div;
  if (!gd.data) gd.innerHTML = '';   // placeholder 텍스트만 제거 — 기존 플롯 DOM은 Plotly.react가 관리
  Plotly.react(gd, buildTraces(cfg), buildLayout(cfg, gd._fullLayout ? gd : null), {
    responsive: true, displaylogo: false,
    scrollZoom: true, displayModeBar: true,
    edits: { annotationTail: true },
    modeBarButtonsToRemove: ['lasso2d', 'select2d'],
  }).then(() => {
    if (!gd._vizBound) {
      gd._vizBound = true;
      gd.on('plotly_click', ev => {
        const p = ev.points && ev.points[0];
        if (!p || p.data.name === 'Pareto frontier') return;
        const c = state.charts.find(ch => ch.id === cfg.id);
        if (c) showPointPopover(c, gd, p, ev.event);
      });
      gd.on('plotly_clickannotation', ev => {
        const c = state.charts.find(ch => ch.id === cfg.id);
        if (!c || !ev.annotation) return;
        if (ev.annotation._kind === 'plabel') {          // 포인트 레이블 클릭 → 개별 숨김
          if (!c.hiddenLabels.includes(ev.annotation._key)) c.hiddenLabels.push(ev.annotation._key);
          renderPlot(c); refreshPanels(c); save();
        } else if (ev.annotation._kind === 'tmarker') {  // 텍스트 마커 클릭 → 편집/삭제
          showMarkerEditPopover(c, ev.annotation._tmIdx, ev.event);
        }
      });
      gd.on('plotly_relayout', ev => {
        const c = state.charts.find(ch => ch.id === cfg.id);
        if (!c) return;
        let moved = false, zoomed = false;
        for (const k of Object.keys(ev)) {
          const m = k.match(/^annotations\[(\d+)\]\.(ax|ay)$/);
          if (m) {
            const ann = gd.layout.annotations[Number(m[1])];
            if (!ann) continue;
            if (ann._kind === 'plabel' && ann._key) {
              const off = c.labelOffsets[ann._key] || { ax: 0, ay: -14 };
              off[m[2]] = ev[k];
              c.labelOffsets[ann._key] = off;
              moved = true;
            } else if (ann._kind === 'tmarker' && c.textMarkers[ann._tmIdx]) {
              c.textMarkers[ann._tmIdx][m[2]] = ev[k];
              moved = true;
            }
          }
          if (/^[xy]axis\.range/.test(k) || k === 'autosize') zoomed = true;
        }
        if (moved) save();
        if (zoomed && c.baselines.some(b => (b.shade || 'none') !== 'none')) {
          Plotly.relayout(gd, { shapes: baselineShapes(c, gd) });
        }
      });
    }
  });
}

/* ---- 포인트 클릭 팝오버: 베이스라인 / 텍스트 마커 ---- */
const popover = document.createElement('div');
popover.id = 'ptPopover';
document.body.append(popover);
document.addEventListener('pointerdown', e => { if (!popover.contains(e.target)) hidePopover(); }, true);
function hidePopover() { popover.classList.remove('show'); popover.innerHTML = ''; }
function placePopover(mouseEv) {
  const x = Math.min((mouseEv && mouseEv.clientX || 200) + 6, window.innerWidth - 230);
  const y = Math.min((mouseEv && mouseEv.clientY || 200) + 6, window.innerHeight - 140);
  popover.style.left = x + 'px'; popover.style.top = y + 'px';
  popover.classList.add('show');
}
function showPointPopover(c, gd, p, mouseEv) {
  popover.innerHTML = '';
  const bIdx = c.baselines.findIndex(b => b.x === p.x && b.y === p.y);
  popover.append(
    el('div', { class: 'pp-title' }, `(${p.x}, ${p.y})`),
    el('button', {
      onclick: () => {
        if (bIdx >= 0) c.baselines.splice(bIdx, 1);
        else c.baselines.push({ x: p.x, y: p.y, shade: 'none' });
        hidePopover(); renderPlot(c); refreshPanels(c); save();
      },
    }, bIdx >= 0 ? t('pt.removeBaseline') : t('pt.addBaseline')),
    el('button', {
      onclick: () => {
        const g = p.data && p.data._g, g2 = p.data && p.data._g2;
        const hit = [];
        for (const r of allRows()) {
          if (r._excluded) continue;
          if (r[c.x] === p.x && r[c.y] === p.y
              && (g == null || String(r[c.group]) === g)
              && (g2 == null || String(r[c.group2]) === g2)) { r._excluded = true; hit.push(r); }
        }
        hidePopover();
        if (hit.length) {
          const refresh = () => { for (const ch of state.charts) renderPlot(ch); renderTable(); save(); };
          refresh();
          showToast(tf('toast.excluded', { n: hit.length }), t('toast.undo'), () => { hit.forEach(r => delete r._excluded); refresh(); });
        }
      },
    }, t('pt.excludePoint')),
    el('button', {
      onclick: () => {
        const g = p.data && p.data._g, g2 = p.data && p.data._g2;
        const match = r => r[c.x] === p.x && r[c.y] === p.y
          && (g == null || String(r[c.group]) === g) && (g2 == null || String(r[c.group2]) === g2);
        const already = allRows().some(r => match(r) && r._muted);
        const hit = [];
        for (const r of allRows()) if (match(r) && !r._excluded) { if (already) delete r._muted; else r._muted = true; hit.push(r); }
        hidePopover();
        if (hit.length) {
          const refresh = () => { for (const ch of state.charts) renderPlot(ch); renderTable(); save(); };
          refresh();
          if (!already) showToast(tf('toast.muted', { n: hit.length }), t('toast.undo'), () => { hit.forEach(r => delete r._muted); refresh(); });
        }
      },
    }, allRows().some(r => r[c.x] === p.x && r[c.y] === p.y && r._muted) ? t('pt.unmute') : t('pt.mute')),
    el('button', {
      onclick: () => {
        popover.innerHTML = '';
        const inp = el('input', { type: 'text', placeholder: t('pt.textPlaceholder') });
        const add = () => {
          const txt = inp.value.trim();
          if (txt) { c.textMarkers.push({ x: p.x, y: p.y, text: txt, ax: 40, ay: -40 }); renderPlot(c); refreshPanels(c); save(); }
          hidePopover();
        };
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') add(); if (e.key === 'Escape') hidePopover(); });
        popover.append(el('div', { class: 'pp-title' }, t('pt.textMarker')), inp,
          el('div', { class: 'pp-row' }, el('button', { onclick: add }, t('btn.add')), el('button', { onclick: hidePopover }, t('btn.cancel'))));
        placePopover(mouseEv); inp.focus();
      },
    }, t('pt.addTextMarker')),
    el('div', { class: 'pp-note' }, t('pt.excludeNote')),
  );
  placePopover(mouseEv);
}
function showMarkerEditPopover(c, idx, mouseEv) {
  const m = c.textMarkers[idx];
  if (!m) return;
  popover.innerHTML = '';
  const inp = el('input', { type: 'text', value: m.text });
  const apply = () => {
    const txt = inp.value.trim();
    if (txt) m.text = txt; else c.textMarkers.splice(idx, 1);   // 비우면 삭제
    hidePopover(); renderPlot(c); refreshPanels(c); save();
  };
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') apply(); if (e.key === 'Escape') hidePopover(); });
  const live = () => { renderPlot(c); refreshPanels(c); save(); };
  popover.append(el('div', { class: 'pp-title' }, t('pt.editTextMarker')), inp,
    el('div', { class: 'pp-row' },
      el('input', { type: 'color', value: m.color || c.tmColor || c.fontColor || CHROME.ink, title: t('cfg.fontColorTitle'), oninput: e => { m.color = e.target.value; live(); } }),
      el('input', { type: 'number', value: m.size || '', min: 8, max: 40, placeholder: t('pt.sizePlaceholder'), title: t('pt.sizeTitle'), style: 'width:64px', oninput: e => { m.size = e.target.value; live(); } }),
    ),
    el('div', { class: 'pp-row' },
      el('button', { onclick: apply }, t('btn.save')),
      el('button', { class: 'danger', onclick: () => { c.textMarkers.splice(idx, 1); hidePopover(); live(); } }, t('btn.delete')),
      el('button', { onclick: hidePopover }, t('btn.cancel'))));
  placePopover(mouseEv); inp.focus(); inp.select();
}
/* 설정 패널의 동적 목록(베이스라인/마커/숨긴 레이블) 갱신 */
function refreshPanels(cfg) {
  if (cfg._refreshLists) cfg._refreshLists();
}

/* ---- 토스트 (실행 취소 지원) ---- */
const toastEl = document.createElement('div');
toastEl.id = 'toast';
document.body.append(toastEl);
let toastTimer = null;
function showToast(msg, actionLabel, action) {
  toastEl.innerHTML = '';
  toastEl.append(el('span', {}, msg));
  if (action) toastEl.append(el('button', { onclick: () => { action(); toastEl.classList.remove('show'); } }, actionLabel));
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 5000);
}

/* ================= chart card UI ================= */
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) e.append(c);
  return e;
}
function select(options, value, onchange, attrs = {}) {
  const s = el('select', { ...attrs, onchange: e => onchange(e.target.value) });
  for (const o of options) {
    const [val, label] = Array.isArray(o) ? o : [o, o];
    const opt = el('option', { value: val }, label);
    if (String(val) === String(value)) opt.selected = true;
    s.append(opt);
  }
  return s;
}
function colSelect(cfg, key, opts) {
  const { allowEmpty = true, emptyLabel = t('opt.noneParen'), onChange } = opts || {};
  const cols = visibleColumns();
  const items = allowEmpty ? [['', emptyLabel], ...cols] : cols;
  return select(items, cfg[key], v => { cfg[key] = v; if (onChange) onChange(); renderPlot(cfg); save(); });
}

function renderChartCard(cfg) {
  const card = el('section', { class: 'card chart-card' + (cfg.cardWidth === 'half' ? ' half' : ''), 'data-chart': cfg.id });

  const chartNo = state.charts.indexOf(cfg) + 1;
  const nameSpan = el('span', { class: 'name' }, cfg.title || tf('card.chartNum', { n: chartNo }));
  const cfgPanel = el('div', { class: 'cfg' });
  const plotDiv = el('div', { class: 'plot', style: `min-height:${cfg.plotHeight || 460}px;height:${cfg.plotHeight || 460}px` });
  plotDivs[cfg.id] = plotDiv;

  const head = el('div', { class: 'head' },
    nameSpan,
    el('button', { class: 'small', title: t('card.resetViewTitle'), onclick: () => {
      cfg.xMin = cfg.xMax = cfg.yMin = cfg.yMax = '';
      renderPlot(cfg);
      if (plotDiv.data) Plotly.relayout(plotDiv, { 'xaxis.autorange': true, 'yaxis.autorange': true });
      buildCfgPanel(cfg, cfgPanel, nameSpan); save();
    } }, t('card.resetView')),
    el('button', { class: 'small', onclick: () => cfgPanel.classList.toggle('hidden') }, t('card.settings')),
    el('button', { class: 'small', onclick: e => showPresetMenu(cfg, e) }, t('card.preset')),
    el('button', { class: 'small', onclick: () => exportImg(cfg, 'png') }, 'PNG'),
    el('button', { class: 'small', onclick: () => exportImg(cfg, 'svg') }, 'SVG'),
    el('button', { class: 'small', onclick: () => duplicateChart(cfg) }, t('card.duplicate')),
    el('button', { class: 'small danger', onclick: () => removeChart(cfg.id) }, t('btn.delete')),
  );

  buildCfgPanel(cfg, cfgPanel, nameSpan);
  card.append(head, el('div', { class: 'body' }, cfgPanel, plotDiv),
    el('div', { class: 'plot-hint' }, t('card.plotHint')));
  return card;
}
/* 차트 크기·폭 변경을 카드 재생성 없이 반영하고 Plotly 리사이즈 (폭 변경 시 이웃 차트도 재배치되므로 전부 리사이즈) */
function applyChartSize(cfg) {
  const card = document.querySelector(`.chart-card[data-chart="${cfg.id}"]`);
  if (card) {
    card.classList.toggle('half', cfg.cardWidth === 'half');
    const plot = plotDivs[cfg.id];
    if (plot) { plot.style.minHeight = plot.style.height = (cfg.plotHeight || 460) + 'px'; }
  }
  requestAnimationFrame(() => {
    for (const c of state.charts) { const gd = plotDivs[c.id]; if (gd && gd.data) Plotly.Plots.resize(gd); }
  });
  save();
}

function buildCfgPanel(cfg, panel, nameSpan) {
  panel.innerHTML = '';
  const numCols = numericColumns();
  const isBar = cfg.type === 'bar';
  const rp = () => { renderPlot(cfg); save(); };
  const rebuildPanel = () => { buildCfgPanel(cfg, panel, nameSpan); renderPlot(cfg); save(); };   // 유형별 옵션 표시가 달라질 때
  const row = (label, ...ctrl) => el('div', { class: 'row' }, el('span', { class: 'lbl' }, label), ...ctrl);

  /* --- 데이터 --- */
  const gData = el('details', { class: 'grp', open: '' }, el('summary', {}, t('cfg.data')));
  gData.append(
    row(t('cfg.type'), select([['scatter', t('opt.scatter')], ['line', t('opt.line')], ['scatter+line', t('opt.scatterLine')], ['bar', t('opt.bar')]], cfg.type, v => { cfg.type = v; rebuildPanel(); })),
    row(t('cfg.xAxis'), colSelect(cfg, 'x', { allowEmpty: true, emptyLabel: t('opt.select') })),
    row(t('cfg.yAxis'), colSelect(cfg, 'y', { allowEmpty: true, emptyLabel: t('opt.select') })),
    row(t('cfg.group'), colSelect(cfg, 'group', { onChange: () => rebuild() })),
    row(t('cfg.group2'), colSelect(cfg, 'group2', { onChange: () => rebuild() })),
    el('div', { class: 'hint' }, t('cfg.group2Hint')),
    ...(isBar ? [] : [
      row(t('cfg.size'), colSelect(cfg, 'size')),
      row(t('cfg.colorBy'), select([['', t('opt.noneParen')], ...numericColumns().map(c => [c, c])], cfg.colorBy, v => { cfg.colorBy = v; rp(); })),

function exportImg(cfg, format) {
  const div = plotDivs[cfg.id];
  if (!div || !div.data) { alert(t('err.drawChartFirst')); return; }
  Plotly.downloadImage(div, { format, width: div.clientWidth * 1.0 || 900, height: div.clientHeight || 480, scale: format === 'png' ? 3 : 1, filename: (cfg.title || `chart-${cfg.id}`).replace(/\s+/g, '_') });
}
function addChart(cfgOverride) {
  const cfg = { ...defaultChart(), ...(cfgOverride || {}) };
  // sensible defaults: y는 점수형(score/acc/f1), x는 비용형(token/latency/cost) 컬럼 우선
  if (!cfg.x || !cfg.y) {
    const nums = numericColumns();
    const yGuess = nums.find(c => /score|acc|f1|auc|bleu|rouge|prec|recall/i.test(c));
    const xGuess = nums.find(c => c !== yGuess && /token|budget|latency|time|cost|frame|step|size|param/i.test(c));
    if (!cfg.x) cfg.x = xGuess || nums.find(c => c !== yGuess) || nums[0] || '';
    if (!cfg.y) cfg.y = yGuess || nums.find(c => c !== cfg.x) || '';
    const cats = columns().filter(c => !nums.includes(c) && c !== '_source');
    if (!cfg.group && cats[0]) cfg.group = cats[0];
  }
  state.charts.push(cfg);
  refreshCharts();
  save();
  return cfg;
}
function serializableChart(c) {
  return Object.fromEntries(Object.entries(c).filter(([k, v]) => !k.startsWith('_') && typeof v !== 'function'));
}
function duplicateChart(src) {
  const copy = JSON.parse(JSON.stringify(serializableChart(src)));
  copy.id = state.nextId++;
  copy.title = src.title ? src.title + t('card.copySuffix') : '';
  state.charts.push(copy);
  refreshCharts(); save();
}
function removeChart(id) {
  state.charts = state.charts.filter(c => c.id !== id);
  delete plotDivs[id];
  refreshCharts(); save();
}
function refreshCharts() {
  const box = document.getElementById('charts');
  box.innerHTML = '';
  for (const cfg of state.charts) box.append(renderChartCard(cfg));
  document.getElementById('emptyCharts').style.display = state.charts.length ? 'none' : '';
  for (const cfg of state.charts) renderPlot(cfg);
}
/* 카드를 재생성하지 않고 각 설정 패널만 다시 구성 — 컬럼 목록 변경(계산 컬럼 등) 반영, 열림/접힘 상태 보존 */
function refreshCfgPanels() {
  for (const cfg of state.charts) {
    const card = document.querySelector(`.chart-card[data-chart="${cfg.id}"]`);
    if (!card) continue;
    const panel = card.querySelector('.cfg'), nameSpan = card.querySelector('.head .name');
    if (panel && nameSpan) buildCfgPanel(cfg, panel, nameSpan);
  }
}

/* ================= data table ================= */
const tableState = { search: '', sortCol: null, sortDir: 1, page: 0, pageSize: 200 };
function renderTable() {
  const cols = visibleColumns();
  const table = document.getElementById('dataTable');
  let rows = allRows();
  const q = tableState.search.trim().toLowerCase();
  if (q) rows = rows.filter(r => cols.some(c => r[c] !== null && r[c] !== undefined && String(r[c]).toLowerCase().includes(q)));
  if (tableState.sortCol) {
    const c = tableState.sortCol, d = tableState.sortDir;
    rows = rows.slice().sort((a, b) => {
      const va = a[c], vb = b[c];
      if (va === null || va === undefined) return 1;
      if (vb === null || vb === undefined) return -1;
      if (typeof va === 'number' && typeof vb === 'number') return d * (va - vb);
      return d * String(va).localeCompare(String(vb));
    });
  }
  const total = rows.length;
  const pages = Math.max(1, Math.ceil(total / tableState.pageSize));
  tableState.page = Math.min(tableState.page, pages - 1);
  const start = tableState.page * tableState.pageSize;
  const view = rows.slice(start, start + tableState.pageSize);
  const allIncluded = rows.every(r => !r._excluded);

  let html = `<thead><tr><th class="chk" title="${esc(t('table.allIncludeTitle'))}"><input type="checkbox" id="chkAll"${allIncluded ? ' checked' : ''}></th>` + cols.map(c =>
    `<th data-col="${esc(c)}">${esc(c)}${tableState.sortCol === c ? (tableState.sortDir > 0 ? ' ▲' : ' ▼') : ''}</th>`).join('') + '</tr></thead><tbody>';
  view.forEach((r, i) => {
    html += `<tr class="${r._excluded ? 'excl' : ''}${r._muted ? ' muted' : ''}"><td class="chk"><input type="checkbox" data-i="${i}"${r._excluded ? '' : ' checked'}></td>`
      + cols.map(c => `<td>${r[c] === null || r[c] === undefined ? '<span style="color:var(--axis)">–</span>' : esc(r[c])}</td>`).join('') + '</tr>';
  });
  table.innerHTML = html + '</tbody>';
  const rerenderCharts = () => { for (const c of state.charts) renderPlot(c); };
  table.querySelectorAll('th[data-col]').forEach(th => th.addEventListener('click', () => {
    const c = th.dataset.col;
    if (tableState.sortCol === c) tableState.sortDir *= -1;
    else { tableState.sortCol = c; tableState.sortDir = 1; }
    renderTable();
  }));
  table.querySelectorAll('tbody input[type="checkbox"]').forEach(cb => cb.addEventListener('change', () => {
    const r = view[Number(cb.dataset.i)];
    if (cb.checked) delete r._excluded; else r._excluded = true;
    renderTable(); rerenderCharts(); save();
  }));
  const chkAll = table.querySelector('#chkAll');
  if (chkAll) chkAll.addEventListener('change', () => {
    rows.forEach(r => { if (chkAll.checked) delete r._excluded; else r._excluded = true; });
    renderTable(); rerenderCharts(); save();
  });
  const nExcl = allRows().filter(r => r._excluded).length;
  document.getElementById('tableCount').textContent = tf('table.count', {
    total: total.toLocaleString(), cols: cols.length, all: allRows().length.toLocaleString(),
    excl: nExcl ? tf('table.exclSuffix', { n: nExcl }) : '',
  });
  const restoreBtn = document.getElementById('restoreExcl');
  restoreBtn.hidden = nExcl === 0;
  restoreBtn.textContent = tf('table.restoreExcl', { n: nExcl });
  const nMuted = allRows().filter(r => r._muted).length;
  const mutedBtn = document.getElementById('restoreMuted');
  mutedBtn.hidden = nMuted === 0;
  mutedBtn.textContent = tf('table.restoreMuted', { n: nMuted });
  document.getElementById('pgInfo').textContent = tf('pager.info', { page: pages ? tableState.page + 1 : 0, pages });
}

/* ================= dataset chips ================= */
function renderChips() {
  const box = document.getElementById('datasetChips');
  box.innerHTML = '';
  for (const d of state.datasets) {
    box.append(el('span', { class: 'chip' },
      d.name, el('span', { class: 'n' }, tf('chips.rows', { n: d.rows.length })),
      el('button', { title: t('btn.delete'), onclick: () => removeDataset(d.id) }, '×'),
    ));
  }
}
/* 계산 컬럼 패널 — 이항 연산 / 기준 대비 델타 */
function renderDerived() {
  const panel = document.getElementById('derivedPanel');
  if (!panel) return;
  panel.hidden = !state.datasets.length;
  if (!state.datasets.length) { panel.innerHTML = ''; return; }
  const nums = numericColumns(), cols = visibleColumns();
  const commit = () => { applyDerived(); renderDerived(); renderTable(); refreshCfgPanels(); for (const c of state.charts) renderPlot(c); save(); };
  panel.innerHTML = '';
  panel.append(el('summary', {}, tf('cfg.derivedCount', { n: state.derived.length })));
  // 기존 정의 목록
  state.derived.forEach((d, i) => {
    const desc = d.kind === 'binary' ? `${d.name} = ${d.a} ${({ '-': '−', '+': '+', '*': '×', '/': '÷', ratio: '÷×100%' })[d.op]} ${d.b}`
      : `${d.name} = ${d.valueCol} ${d.mode === 'retention' ? '÷' : '−'} (${d.refCol}=${d.refVal}${(d.keys || []).length ? ', ' + d.keys.join('·') : ''})`;
    panel.append(el('div', { class: 'series-row' },
      el('span', { class: 'sname', title: desc }, desc),
      el('button', { class: 'small danger', onclick: () => { state.derived.splice(i, 1); commit(); } }, '×'),
    ));
  });
  // 추가 폼
  const nameInp = el('input', { type: 'text', placeholder: t('cfg.derivedName'), style: 'width:120px' });
  const kindSel = select([['binary', t('opt.derivedBinary')], ['refdelta', t('opt.derivedRef')]], 'binary', () => renderForm());
  const formBox = el('div', { style: 'display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:4px' });
  const numOpts = nums.map(c => [c, c]);
  const renderForm = () => {
    formBox.innerHTML = '';
    if (kindSel.value === 'binary') {
      const a = select(numOpts, nums[0], () => {}), op = select([['-', '−'], ['+', '+'], ['*', '×'], ['/', '÷'], ['ratio', '÷×100%']], '-', () => {}), b = select(numOpts, nums[1] || nums[0], () => {});
      formBox._get = () => ({ kind: 'binary', a: a.value, op: op.value, b: b.value });
      formBox.append(a, op, b);
    } else {
      const val = select(numOpts, nums[0], () => {}), refCol = select(cols.map(c => [c, c]), cols[0], () => refreshVals()), refVal = select([], '', () => {});
      const mode = select([['delta', t('opt.derivedDelta')], ['retention', t('opt.derivedRetention')]], 'delta', () => {});
      const keysBox = el('span', { style: 'display:inline-flex;gap:6px;flex-wrap:wrap' });
      cols.forEach(c => keysBox.append(el('label', { class: 'inline' }, el('input', { type: 'checkbox', 'data-k': c }), c)));
      const refreshVals = () => { refVal.innerHTML = ''; uniqueVals(refCol.value).forEach(v => refVal.append(el('option', { value: String(v) }, String(v)))); };
      refreshVals();
      formBox._get = () => ({ kind: 'refdelta', valueCol: val.value, refCol: refCol.value, refVal: refVal.value, mode: mode.value,
        keys: [...keysBox.querySelectorAll('input:checked')].map(cb => cb.getAttribute('data-k')) });
      formBox.append(t('cfg.derivedValue') + ':', val, mode, el('span', {}, t('cfg.derivedRefIs')), refCol, refVal, el('span', {}, t('cfg.derivedMatch')), keysBox);
    }
  };
  renderForm();
  panel.append(el('div', { class: 'hint' }, t('cfg.derivedHint')),
    el('div', { class: 'series-row' }, nameInp, kindSel),
    formBox,
    el('button', { class: 'small', onclick: () => {
      const name = nameInp.value.trim();
      if (!name) return alert(t('cfg.derivedName'));
      if (name.startsWith('_') || visibleColumns().includes(name) || state.derived.some(d => d.name === name)) return alert(t('cfg.derivedNameTaken'));
      state.derived.push({ name, ...formBox._get() });
      commit();
    } }, t('cfg.derivedAdd')),
  );
}

/* ================= session persistence ================= */
let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      const charts = state.charts.map(serializableChart);
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ datasets: state.datasets, charts, derived: state.derived, nextId: state.nextId }));
    } catch (e) { /* quota — 데이터가 너무 크면 자동저장 생략 */ }
  }, 400);
}
function loadSaved() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY));
    if (s && s.datasets) {
      restoreSession(s);
      if (!localStorage.getItem(STORAGE_KEY)) { save(); localStorage.removeItem(LEGACY_STORAGE_KEY); }
      return true;
    }
  } catch (e) {}
  return false;
}
function restoreSession(s) {
  state.datasets = s.datasets || [];
  state.derived = s.derived || [];
  state.charts = (s.charts || []).map(c => {
    const m = { ...defaultChart(), ...c };
    if (m.baseline) {   // 구버전 세션 마이그레이션: 단일 baseline → baselines 배열
      m.baselines = [{ x: m.baseline.x, y: m.baseline.y, shade: m.baselineShade || 'none' }];
    }
    delete m.baseline; delete m.baselineShade;
    if (m.fontColor === '#0b0b0b') m.fontColor = '';   // 구 기본값(라이트 잉크) → 자동(테마 따름)
    return m;
  });
  state.nextId = s.nextId || (Math.max(0, ...state.datasets.map(d => d.id), ...state.charts.map(c => c.id)) + 1);
  onDataChanged(false);
  refreshCharts();
}
function exportSession() {
  const charts = state.charts.map(serializableChart);
  const blob = new Blob([JSON.stringify({ datasets: state.datasets, charts, derived: state.derived, nextId: state.nextId }, null, 1)], { type: 'application/json' });
  const a = el('a', { href: URL.createObjectURL(blob), download: 'vtc-visualizer-session.json' });
  a.click(); URL.revokeObjectURL(a.href);
}
/* ---- 현재 표(검색 반영, 제외 행 제거)를 CSV로 ---- */
function toCSV(rows, cols) {
  const cell = v => {
    if (v === null || v === undefined) return '';
    const s = String(v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  return [cols.join(','), ...rows.map(r => cols.map(c => cell(r[c])).join(','))].join('\n');
}
function exportTableCsv() {
  const cols = visibleColumns();
  const q = tableState.search.trim().toLowerCase();
  let rows = allRows().filter(r => !r._excluded);   // 그래프에 실제 쓰이는 데이터
  if (q) rows = rows.filter(r => cols.some(c => r[c] !== null && r[c] !== undefined && String(r[c]).toLowerCase().includes(q)));
  const blob = new Blob(['﻿' + toCSV(rows, cols)], { type: 'text/csv;charset=utf-8' });   // BOM: Excel 한글
  const a = el('a', { href: URL.createObjectURL(blob), download: 'vtc-visualizer-data.csv' });
  a.click(); URL.revokeObjectURL(a.href);
}
/* ---- 모든 차트를 한 장 PNG로 세로 합성 ---- */
async function exportAllCharts() {
  const cfgs = state.charts.filter(c => plotDivs[c.id] && plotDivs[c.id].data);
  if (!cfgs.length) { alert(t('err.drawChartFirst')); return; }
  const imgs = [];
  for (const c of cfgs) {
    const gd = plotDivs[c.id];
    const url = await Plotly.toImage(gd, { format: 'png', scale: 2, width: gd.clientWidth || 900, height: gd.clientHeight || 460 });
    const im = new Image(); im.src = url;
    await new Promise(res => { im.onload = res; });
    imgs.push(im);
  }
  const pad = 24, W = Math.max(...imgs.map(i => i.width));
  const H = imgs.reduce((s, i) => s + i.height, 0) + pad * (imgs.length + 1);
  const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = CHROME.surface; ctx.fillRect(0, 0, W, H);   // 합성 배경 = 현재 테마 서피스
  let y = pad;
  for (const im of imgs) { ctx.drawImage(im, Math.round((W - im.width) / 2), y); y += im.height + pad; }
  cv.toBlob(b => {
    const a = el('a', { href: URL.createObjectURL(b), download: 'vtc-visualizer-all-charts.png' });
    a.click(); URL.revokeObjectURL(a.href);
  }, 'image/png');
}

/* ---- 차트 프리셋: 설정만 저장 (데이터 제외) — 같은 컬럼 이름의 데이터에 재적용 ---- */
const PRESET_KEY = 'vtc-visualizer:presets';
function loadPresets() {
  try { return JSON.parse(localStorage.getItem(PRESET_KEY)) || {}; } catch (e) { return {}; }
}
function savePresets(p) { localStorage.setItem(PRESET_KEY, JSON.stringify(p)); }
function chartPreset(cfg) {
  const p = serializableChart(cfg);
  delete p.id; delete p.title;
  delete p.textMarkers; delete p.labelOffsets; delete p.hiddenLabels;   // 특정 데이터 점에 묶인 필드는 제외
  return p;
}
function applyPreset(cfg, preset) {
  const keep = { id: cfg.id, title: cfg.title };
  const merged = { ...defaultChart(), ...preset, ...keep };   // 프리셋에 없는 새 필드는 기본값으로 (세션 복원과 동일 규칙)
  for (const k of Object.keys(cfg)) if (!k.startsWith('_')) delete cfg[k];
  Object.assign(cfg, merged);
  refreshCharts(); save();   // 유형이 바뀔 수 있으므로 패널 전체 재구성
}
function exportPresets() {
  const blob = new Blob([JSON.stringify(loadPresets(), null, 1)], { type: 'application/json' });
  const a = el('a', { href: URL.createObjectURL(blob), download: 'vtc-visualizer-presets.json' });
  a.click(); URL.revokeObjectURL(a.href);
}
function importPresets(then) {
  const inp = el('input', { type: 'file', accept: '.json' });
  inp.addEventListener('change', async () => {
    try {
      const j = JSON.parse(await inp.files[0].text());
      if (!j || typeof j !== 'object' || Array.isArray(j)) throw new Error('name → preset object expected');
      const all = loadPresets();
      for (const [k, v] of Object.entries(j)) if (v && typeof v === 'object' && !Array.isArray(v)) all[k] = v;
      savePresets(all);
      if (then) then();
    } catch (e) { alert(tf('err.sessionReadFailed', { msg: e.message })); }
  });
  inp.click();
}
function showPresetMenu(cfg, mouseEv) {
  popover.innerHTML = '';
  const names = Object.keys(loadPresets()).sort((a, b) => a.localeCompare(b));
  popover.append(
    el('div', { class: 'pp-title' }, t('pt.presetTitle')),
    el('button', { onclick: () => {
      const name = (prompt(t('pt.presetNamePrompt'), cfg.title || '') || '').trim();
      if (!name) return;
      const all = loadPresets(); all[name] = chartPreset(cfg); savePresets(all);
      hidePopover();
    } }, t('pt.savePreset')),
  );
  if (!names.length) popover.append(el('div', { class: 'pp-note' }, t('pt.noPresets')));
  names.forEach(n => {
    popover.append(el('div', { class: 'pp-row' },
      el('button', { onclick: () => { applyPreset(cfg, loadPresets()[n]); hidePopover(); } }, '▶ ' + n),
      el('button', { class: 'danger', style: 'flex:0 0 auto', onclick: () => {
        const all = loadPresets(); delete all[n]; savePresets(all); showPresetMenu(cfg, mouseEv);
      } }, '×'),
    ));
  });
  popover.append(
    el('div', { class: 'pp-row' },
      el('button', { onclick: () => { exportPresets(); hidePopover(); } }, t('pt.presetExport')),
      el('button', { onclick: () => importPresets(() => showPresetMenu(cfg, mouseEv)) }, t('pt.presetImport')),
    ),
    el('div', { class: 'pp-note' }, t('pt.presetHint')),
  );
  placePopover(mouseEv);
}

/* ================= wiring ================= */
function onDataChanged(autoChart = true) {
  applyDerived();   // 계산 컬럼 재적용 (데이터·정의 변경 반영)
  renderChips();
  renderDerived();
  tableState.page = 0;
  renderTable();
  if (autoChart && state.datasets.length && !state.charts.length) addChart();
  else refreshCharts();
  save();
}
async function loadFiles(files) {
  for (const f of files) {
    if (!/\.(csv|tsv|json)$/i.test(f.name)) continue;
    try {
      const text = await f.text();
      addDataset(f.name.replace(/^.*\//, ''), parseAny(text, f.name));
    } catch (e) { alert(tf('err.parseFailed', { name: f.name, msg: e.message })); }
  }
}

const dz = document.getElementById('dropzone');
['dragover', 'dragenter'].forEach(ev => document.body.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag'); }));
['dragleave', 'dragend'].forEach(ev => document.body.addEventListener(ev, e => { if (e.target === document.body || e.relatedTarget === null) dz.classList.remove('drag'); }));
document.body.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  if (e.dataTransfer && e.dataTransfer.files.length) loadFiles([...e.dataTransfer.files]);
});
document.getElementById('btnOpenFiles').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('btnOpenFolder').addEventListener('click', () => document.getElementById('folderInput').click());
document.getElementById('fileInput').addEventListener('change', e => { loadFiles([...e.target.files]); e.target.value = ''; });
document.getElementById('folderInput').addEventListener('change', e => { loadFiles([...e.target.files]); e.target.value = ''; });

document.getElementById('btnPaste').addEventListener('click', () => document.getElementById('modalBack').classList.add('show'));
document.getElementById('pasteCancel').addEventListener('click', () => document.getElementById('modalBack').classList.remove('show'));
document.getElementById('pasteAdd').addEventListener('click', () => {
  const name = document.getElementById('pasteName').value.trim() || `pasted-${state.datasets.length + 1}`;
  const text = document.getElementById('pasteText').value;
  try {
    addDataset(name, parseAny(text, name));
    document.getElementById('modalBack').classList.remove('show');
    document.getElementById('pasteText').value = ''; document.getElementById('pasteName').value = '';
  } catch (e) { alert(tf('err.parseFailedGeneric', { msg: e.message })); }
});
document.getElementById('modalBack').addEventListener('click', e => { if (e.target.id === 'modalBack') e.target.classList.remove('show'); });

document.getElementById('btnAddChart').addEventListener('click', () => addChart());
document.getElementById('btnExportSession').addEventListener('click', exportSession);
document.getElementById('btnImportSession').addEventListener('click', () => {
  const inp = el('input', { type: 'file', accept: '.json' });
  inp.addEventListener('change', async () => {
    try { restoreSession(JSON.parse(await inp.files[0].text())); save(); }
    catch (e) { alert(tf('err.sessionReadFailed', { msg: e.message })); }
  });
  inp.click();
});
document.getElementById('btnReset').addEventListener('click', () => {
  if (!confirm(t('confirm.resetAll'))) return;
  localStorage.removeItem(STORAGE_KEY);
  state.datasets = []; state.charts = []; state.nextId = 1;
  onDataChanged(false); refreshCharts();
});
document.getElementById('restoreExcl').addEventListener('click', () => {
  allRows().forEach(r => { delete r._excluded; });
  renderTable();
  for (const c of state.charts) renderPlot(c);
  save();
});
document.getElementById('restoreMuted').addEventListener('click', () => {
  allRows().forEach(r => { delete r._muted; });
  renderTable();
  for (const c of state.charts) renderPlot(c);
  save();
});
document.getElementById('btnExportCsv').addEventListener('click', exportTableCsv);
document.getElementById('btnExportAll').addEventListener('click', exportAllCharts);
document.getElementById('tableSearch').addEventListener('input', e => { tableState.search = e.target.value; tableState.page = 0; renderTable(); });
document.getElementById('pgPrev').addEventListener('click', () => { tableState.page = Math.max(0, tableState.page - 1); renderTable(); });
document.getElementById('pgNext').addEventListener('click', () => { tableState.page += 1; renderTable(); });
document.getElementById('btnLangToggle').addEventListener('click', () => {
  LANG = LANG === 'ko' ? 'en' : 'ko';
  localStorage.setItem(LANG_KEY, LANG);
  applyLang();
  refreshCharts(); renderTable(); renderChips();
  const b = document.getElementById('btnTheme'); if (b) b.title = t('theme.toggle');
  applyWidth();   // 폭 버튼 라벨도 언어에 맞춰 갱신
});
document.getElementById('btnTheme').addEventListener('click', toggleTheme);
document.getElementById('btnWidth').addEventListener('click', cycleWidth);
if (window.matchMedia) window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (THEME === 'auto') applyTheme(); });

/* visualizer.py 서버가 있으면 폴더의 csv/json을 자동 로드 */
async function tryServerAutoload() {
  if (!/^https?:$/.test(location.protocol)) return;
  try {
    const res = await fetch('api/files');
    if (!res.ok) return;
    const files = await res.json();
    for (const name of files) {
      if (state.datasets.some(d => d.name === name)) continue;
      const r = await fetch('api/file?name=' + encodeURIComponent(name));
      if (r.ok) {
        try { addDataset(name, parseAny(await r.text(), name)); }
        catch (e) { console.warn('자동 로드 실패:', name, e); }
      }
    }
  } catch (e) { /* 서버 없음 — 정상 */ }
}

/* ================= init ================= */
document.getElementById('appVersion').textContent = APP_VERSION;
document.querySelector('.footer-ver').textContent = APP_VERSION;
applyLang();
applyTheme();   // CHROME·PALETTE·SEQ를 테마에 맞춰 설정 (첫 렌더 전)
applyWidth();
loadSaved();
renderChips(); renderDerived(); renderTable(); refreshCharts();
tryServerAutoload();
</script>
